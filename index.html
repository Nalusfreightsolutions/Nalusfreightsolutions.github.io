<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarelys Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --navy-950:#0B1B2B;
    --navy-900:#122438;
    --navy-800:#1B3450;
    --navy-700:#254566;
    --steel-100:#EEF2F6;
    --steel-200:#DCE4EC;
    --steel-400:#9FB0C3;
    --amber-500:#E8871E;
    --amber-600:#CC6E0C;
    --good-500:#2E9E5B;
    --bad-500:#D8483D;
    --white:#FFFFFF;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',system-ui,sans-serif;
    background:var(--steel-100);
    color:var(--navy-950);
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{
    font-family:'Oswald',system-ui,sans-serif;
    letter-spacing:.02em;
    text-transform:uppercase;
  }
  .mono{font-family:'JetBrains Mono',monospace;}

  /* ---- Shell ---- */
  #shell{display:flex; min-height:100vh;}
  #sidebar{
    width:230px; flex-shrink:0; background:var(--navy-950);
    color:var(--steel-200); padding:20px 0; position:sticky; top:0; height:100vh;
  }
  #brand{padding:0 20px 20px; border-bottom:1px solid var(--navy-700);}
  #brand .mark{font-family:'Oswald'; font-weight:700; font-size:20px; color:var(--white); letter-spacing:.03em;}
  #brand .sub{font-size:11px; color:var(--steel-400); margin-top:4px; text-transform:uppercase; letter-spacing:.08em;}
  nav{padding:14px 10px;}
  .navbtn{
    display:flex; align-items:center; gap:10px; width:100%; text-align:left;
    background:none; border:none; color:var(--steel-200); font-family:'Inter';
    font-size:13.5px; font-weight:600; padding:11px 12px; border-radius:6px; cursor:pointer;
    margin-bottom:2px; transition:background .12s;
  }
  .navbtn:hover{background:var(--navy-800);}
  .navbtn.active{background:var(--amber-500); color:var(--navy-950);}
  .navbtn .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.55;flex-shrink:0;}
  #savebadge{
    margin:16px 10px 0; padding:9px 12px; border-radius:6px; background:var(--navy-800);
    font-size:11px; color:var(--steel-400); display:flex; align-items:center; gap:7px;
  }
  #savebadge .pulse{width:7px;height:7px;border-radius:50%;background:var(--good-500);}

  #main{flex:1; padding:28px 34px 60px; max-width:1180px;}
  .pagehead{margin-bottom:22px;}
  .pagehead h1{font-size:26px; margin:0 0 4px; color:var(--navy-950);}
  .pagehead p{margin:0; color:#5C7085; font-size:14px; font-family:'Inter';}

  .card{
    background:var(--white); border:1px solid var(--steel-200); border-radius:10px;
    padding:20px 22px; margin-bottom:18px;
  }
  .card h2{font-size:15px; margin:0 0 14px; color:var(--navy-800); display:flex; align-items:center; justify-content:space-between;}
  .card h2 .tag{font-family:'JetBrains Mono'; font-size:10px; background:var(--steel-100); color:#5C7085; padding:3px 8px; border-radius:4px; text-transform:none; letter-spacing:0; font-weight:500;}

  /* ---- Stat grid ---- */
  .statgrid{display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; margin-bottom:18px;}
  .stat{background:var(--navy-950); color:var(--white); border-radius:10px; padding:18px 20px; position:relative; overflow:hidden;}
  .stat.amber{background:linear-gradient(135deg,var(--amber-600),var(--amber-500));}
  .stat .label{font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--steel-400); font-weight:600;}
  .stat.amber .label{color:rgba(11,27,43,.65);}
  .stat .value{font-family:'Oswald'; font-size:26px; margin-top:6px; font-weight:600;}
  .stat.amber .value{color:var(--navy-950);}
  .stat .sub{font-size:11px; color:var(--steel-400); margin-top:4px;}
  .stat.amber .sub{color:rgba(11,27,43,.6);}

  /* ---- Forms ---- */
  .formgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; align-items:end;}
  .loadform-fixed{grid-template-columns:repeat(6,minmax(0,1fr));}
  @media(max-width:1100px){ .loadform-fixed{grid-template-columns:repeat(3,minmax(0,1fr));} }
  @media(max-width:700px){ .loadform-fixed{grid-template-columns:repeat(2,minmax(0,1fr));} }
  .field{display:flex; flex-direction:column; gap:5px;}
  .field label{font-size:11px; font-weight:600; color:#5C7085; text-transform:uppercase; letter-spacing:.04em;}
  .field input, .field select{
    padding:9px 10px; border:1.5px solid var(--steel-200); border-radius:6px; font-size:13.5px;
    font-family:'Inter'; background:var(--white); color:var(--navy-950);
  }
  .field input:focus, .field select:focus{outline:none; border-color:var(--amber-500);}
  .btn{
    padding:10px 18px; border-radius:6px; border:none; font-weight:700; font-size:13px;
    cursor:pointer; font-family:'Inter'; letter-spacing:.02em; transition:opacity .12s;
  }
  .btn:hover{opacity:.88;}
  .btn-primary{background:var(--amber-500); color:var(--navy-950);}
  .btn-ghost{background:var(--steel-100); color:var(--navy-800);}
  .btn-danger{background:#FDECEA; color:var(--bad-500);}
  .btn-sm{padding:5px 10px; font-size:11.5px; border-radius:5px;}

  /* ---- Table ---- */
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{
    text-align:left; padding:9px 10px; font-size:10.5px; text-transform:uppercase; letter-spacing:.05em;
    color:#5C7085; border-bottom:2px solid var(--steel-200); white-space:nowrap; font-weight:700;
  }
  td{padding:9px 10px; border-bottom:1px solid var(--steel-100); white-space:nowrap;}
  tr:hover td{background:var(--steel-100);}
  .num{font-family:'JetBrains Mono'; font-size:12.5px;}
  .tablewrap{overflow-x:auto;}
  /* Keeps Edit/Delete reachable without scrolling all the way across very wide
     tables (e.g. NNL/NFS Loads, which can run 20+ columns). */
  .sticky-actions{position:sticky; right:0; background:#fff; box-shadow:-2px 0 4px rgba(0,0,0,0.06);}
  .pill{padding:3px 9px; border-radius:20px; font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.03em;}
  .pill.paid{background:#E2F5EA; color:var(--good-500);}
  .pill.pending{background:#FDF1E2; color:var(--amber-600);}
  .pill.invoiced{background:#E8EFFB; color:#2C5FA8;}
  .empty{padding:28px; text-align:center; color:#9FB0C3; font-size:13px;}

  .check-ok{color:var(--good-500); font-weight:700;}
  .check-bad{color:var(--bad-500); font-weight:700;}
  .balancebar{
    display:flex; align-items:center; justify-content:space-between; padding:16px 20px;
    border-radius:10px; margin-top:6px; font-family:'Oswald'; font-size:15px; font-weight:600;
  }
  .balancebar.ok{background:#E2F5EA; color:var(--good-500);}
  .balancebar.bad{background:#FDECEA; color:var(--bad-500);}
  .balancebar.warn{background:#FDF1E2; color:var(--amber-600);}

  .grouprow{background:var(--steel-100); font-weight:700;}
  .sectiontitle{font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:#5C7085; margin:20px 0 10px;}
  .flexbar{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:14px;}

  .companytabs{display:flex; gap:8px; margin-bottom:18px;}
  .companytabs button{
    padding:8px 16px; border-radius:20px; border:1.5px solid var(--steel-200); background:var(--white);
    font-weight:700; font-size:12.5px; cursor:pointer; color:#5C7085;
  }
  .companytabs button.active{background:var(--navy-950); border-color:var(--navy-950); color:var(--white);}

  .weekpick{display:flex; align-items:center; gap:12px; margin-bottom:20px;}
  .weekpick input[type=date]{padding:9px 12px; border:1.5px solid var(--amber-500); border-radius:6px; font-size:14px; font-weight:700; font-family:'JetBrains Mono'; background:#FFF7EE;}
  .weekbtn{background:none; border:1.5px solid var(--steel-200); border-radius:6px; padding:8px 10px; cursor:pointer; font-weight:700; color:var(--navy-800);}

  .note{font-size:12px; color:#5C7085; background:var(--steel-100); border-left:3px solid var(--amber-500); padding:10px 12px; border-radius:0 6px 6px 0; margin-bottom:14px;}

  @media(max-width:900px){
    #shell{flex-direction:column;}
    #sidebar{width:100%; height:auto; position:relative;}
    nav{display:flex; overflow-x:auto; gap:4px;}
    .navbtn{white-space:nowrap;}
    #main{padding:20px;}
  }

  /* ---- Invoice modal ---- */
  #invoice-overlay{
    display:none; position:fixed; inset:0; background:rgba(11,27,43,.55); z-index:100;
    align-items:flex-start; justify-content:center; padding:30px 16px; overflow-y:auto;
  }
  #invoice-modal{
    background:#fff; width:100%; max-width:720px; border-radius:10px; padding:40px 44px;
    box-shadow:0 20px 60px rgba(0,0,0,.3);
  }
  #invoice-modal.wide{ max-width:1000px; }
  .inv-head{display:flex; justify-content:space-between; align-items:flex-start; border-bottom:3px solid var(--navy-950); padding-bottom:18px; margin-bottom:22px;}
  .inv-brand{font-family:'Oswald'; font-size:22px; font-weight:700; color:var(--navy-950); letter-spacing:.02em;}
  .inv-sub{font-size:12px; color:#5C7085; margin-top:3px; line-height:1.5;}
  .inv-title{font-family:'Oswald'; font-size:26px; color:var(--amber-500); text-align:right; letter-spacing:.05em;}
  .inv-meta{text-align:right; font-size:12.5px; color:#5C7085; margin-top:6px; line-height:1.6;}
  .inv-meta strong{color:var(--navy-950);}
  .inv-billto{margin-bottom:20px;}
  .inv-billto .lbl{font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:#9FB0C3; font-weight:700; margin-bottom:4px;}
  .inv-billto .name{font-size:16px; font-weight:700; color:var(--navy-950);}
  #invoice-modal table{width:100%; border-collapse:collapse; margin-bottom:8px;}
  #invoice-modal th{background:var(--navy-950); color:#fff; text-align:left; padding:9px 10px; font-size:10.5px; text-transform:uppercase; letter-spacing:.04em;}
  #invoice-modal td{padding:9px 10px; border-bottom:1px solid var(--steel-200); font-size:13px; white-space:normal; vertical-align:top;}
  #invoice-modal th{white-space:normal;}
  .inv-totals{display:flex; justify-content:flex-end; margin-top:10px;}
  .inv-totals table{width:260px;}
  .inv-totals td{border:none; padding:6px 10px;}
  .inv-totals .grand td{font-weight:700; font-size:16px; border-top:2px solid var(--navy-950); color:var(--navy-950);}
  .inv-terms{margin-top:26px; padding-top:16px; border-top:1px solid var(--steel-200); font-size:12px; color:#5C7085; line-height:1.7;}
  .modal-actions{display:flex; gap:10px; justify-content:flex-end; margin-top:26px;}

  @media print{
    body *{visibility:hidden;}
    #invoice-overlay, #invoice-modal, #invoice-modal *{visibility:visible;}
    #invoice-overlay{position:absolute; inset:auto; top:0; left:0; width:100%; overflow:visible; background:none; padding:0; display:block !important;}
    #invoice-modal{position:absolute; top:0; left:0; width:100%; max-width:none; box-shadow:none; border-radius:0;}
    .no-print{display:none !important;}
    .invoice-page:not(:last-child){page-break-after:always;}
  }
</style>
</head>
<body>

<div id="safety-banner" style="display:none; position:fixed; top:0; left:0; right:0; z-index:99999; background:var(--bad-500); color:#fff; padding:14px 20px; font-size:13.5px; line-height:1.6; box-shadow:0 2px 10px rgba(0,0,0,.3);">
  <div style="max-width:900px; margin:0 auto; display:flex; gap:16px; align-items:flex-start;">
    <div id="safety-banner-msg" style="flex:1;"></div>
    <button id="safety-banner-dismiss" style="background:rgba(255,255,255,.2); border:none; color:#fff; padding:6px 12px; border-radius:5px; font-size:12px; cursor:pointer; flex-shrink:0;">Dismiss</button>
  </div>
</div>

<div id="boot-loading" style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#9FB0C3; font-family:'Inter'; gap:16px; text-align:center; padding:20px;">
  <div>Loading…</div>
  <div id="boot-stuck" style="display:none; max-width:380px;">
    <div style="font-size:13px; margin-bottom:14px;">This is taking longer than it should — the sign-in check may be stuck. This usually fixes it:</div>
    <button id="boot-reset-btn" style="background:var(--amber-500); color:var(--navy-950); border:none; padding:10px 20px; border-radius:6px; font-size:13px; font-weight:700; cursor:pointer;">Reset &amp; Reload</button>
  </div>
</div>

<div id="login-screen" style="display:none; min-height:100vh; align-items:center; justify-content:center; background:var(--navy-950); padding:20px;">
  <div style="background:#fff; border-radius:12px; padding:40px; max-width:380px; width:100%; box-shadow:0 20px 60px rgba(0,0,0,.3);">
    <div style="font-family:'Oswald'; font-size:22px; font-weight:700; color:var(--navy-950);">Jarelys</div>
    <div style="font-size:13px; color:#5C7085; margin-bottom:24px;">Command Center — Sign In</div>
    <div style="margin-bottom:14px;"><label style="font-size:12px; font-weight:700; color:#5C7085; display:block; margin-bottom:4px;">Email</label><input type="email" id="login-email" style="width:100%; padding:10px 12px; border:1.5px solid var(--steel-200); border-radius:6px; font-size:14px; box-sizing:border-box;"></div>
    <div style="margin-bottom:8px;"><label style="font-size:12px; font-weight:700; color:#5C7085; display:block; margin-bottom:4px;">Password</label><input type="password" id="login-password" style="width:100%; padding:10px 12px; border:1.5px solid var(--steel-200); border-radius:6px; font-size:14px; box-sizing:border-box;"></div>
    <div id="login-error" style="color:var(--bad-500); font-size:12.5px; margin:8px 0; display:none;"></div>
    <button class="btn btn-primary" id="login-submit" style="width:100%; margin-top:10px;">Sign In</button>
    <div style="font-size:12px; color:#9FB0C3; margin-top:16px; text-align:center;">Don't have an account? Ask the owner to set one up for you.</div>
  </div>
</div>

<div id="shell" style="display:none;">
  <div id="sidebar">
    <div id="brand">
      <div class="mark">Jarelys</div>
      <div class="sub">Command Center</div>
    </div>
    <nav id="navlinks"></nav>
    <div id="savebadge"><span class="pulse"></span><span id="savetext">Saved automatically</span></div>
    <div id="userbadge" style="padding:10px 20px 16px; font-size:12px; color:#9FB0C3; display:flex; flex-direction:column; gap:8px;">
      <span id="user-email" style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></span>
      <div style="display:flex; gap:8px;">
        <button id="changepw-btn" style="background:none; border:1px solid #33465F; color:#9FB0C3; padding:4px 10px; border-radius:5px; font-size:11px; cursor:pointer; flex:1;">Change Password</button>
        <button id="signout-btn" style="background:none; border:1px solid #33465F; color:#9FB0C3; padding:4px 10px; border-radius:5px; font-size:11px; cursor:pointer; flex-shrink:0;">Sign Out</button>
      </div>
    </div>
  </div>
  <div id="main"></div>
</div>

<div id="password-overlay" style="display:none; position:fixed; inset:0; background:rgba(14,30,48,0.55); z-index:9999; align-items:center; justify-content:center;">
  <div style="background:#fff; border-radius:12px; padding:28px 32px; max-width:380px; width:90%; box-shadow:0 20px 60px rgba(0,0,0,0.3);">
    <div style="font-family:'Oswald'; font-size:17px; font-weight:700; color:var(--navy-950); margin-bottom:16px;">Change Password</div>
    <div style="margin-bottom:14px;"><label style="font-size:12px; font-weight:700; color:#5C7085; display:block; margin-bottom:4px;">New Password</label><input type="password" id="newpw-input" style="width:100%; padding:10px 12px; border:1.5px solid var(--steel-200); border-radius:6px; font-size:14px; box-sizing:border-box;"></div>
    <div style="margin-bottom:8px;"><label style="font-size:12px; font-weight:700; color:#5C7085; display:block; margin-bottom:4px;">Confirm New Password</label><input type="password" id="newpw-confirm-input" style="width:100%; padding:10px 12px; border:1.5px solid var(--steel-200); border-radius:6px; font-size:14px; box-sizing:border-box;"></div>
    <div id="newpw-error" style="color:var(--bad-500); font-size:12.5px; margin:8px 0; display:none;"></div>
    <div id="newpw-success" style="color:var(--good-500); font-size:12.5px; margin:8px 0; display:none;"></div>
    <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:10px;">
      <button class="btn btn-ghost" id="newpw-cancel-btn">Cancel</button>
      <button class="btn btn-primary" id="newpw-save-btn">Save</button>
    </div>
  </div>
</div>

<div id="invoice-overlay">
  <div id="invoice-modal"></div>
</div>

<div id="confirm-overlay" style="display:none; position:fixed; inset:0; background:rgba(14,30,48,0.55); z-index:9999; align-items:center; justify-content:center;">
  <div style="background:#fff; border-radius:12px; padding:24px 28px; max-width:380px; width:90%; box-shadow:0 20px 60px rgba(0,0,0,0.3);">
    <div id="confirm-message" style="font-size:14.5px; color:var(--navy-950,#0E1E30); line-height:1.5; margin-bottom:20px;"></div>
    <div style="display:flex; gap:10px; justify-content:flex-end;">
      <button class="btn btn-ghost" id="confirm-cancel-btn">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok-btn">Confirm</button>
    </div>
  </div>
</div>

<div id="unitpick-overlay" style="display:none; position:fixed; inset:0; background:rgba(14,30,48,0.55); z-index:9999; align-items:center; justify-content:center;">
  <div style="background:#fff; border-radius:12px; padding:24px 28px; max-width:400px; width:90%; box-shadow:0 20px 60px rgba(0,0,0,0.3);">
    <div id="unitpick-message" style="font-size:14.5px; font-weight:700; color:var(--navy-950,#0E1E30); line-height:1.5; margin-bottom:16px;"></div>
    <div id="unitpick-options" style="display:flex; flex-direction:column; gap:8px;"></div>
    <div style="display:flex; justify-content:flex-end; margin-top:16px;">
      <button class="btn btn-ghost" id="unitpick-cancel-btn">Cancel</button>
    </div>
  </div>
</div>

// Generic helper: wires oninput/onchange on a form's top-level fields so their values survive
// re-renders triggered by unrelated parts of the page (e.g. editing a material line item).
// Without this, typing in these fields then interacting with a material row would wipe them out,
// because renderXSection() rebuilds the whole form's HTML from the draft on every render().
function wireFormDraftFields(fieldMap, draft){
  Object.keys(fieldMap).forEach(domId=>{
    const el = document.getElementById(domId);
    if(!el) return;
    const key = fieldMap[domId];
    const handler = ()=>{ draft[key] = el.value; };
    el.oninput = handler;
    el.onchange = handler;
  });
}

function nextFriday(){
  const d = new Date();
  const day = d.getDay(); // Sun0..Sat6
  let diff = 5 - day; if(diff < 0) diff += 7;
  d.setDate(d.getDate()+diff);
  return d.toISOString().slice(0,10);
}
function weekEndingFriday(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  if(isNaN(d)) return ''; // blank/invalid date (e.g. a load saved with no date) shouldn't crash week grouping
  const day = d.getDay();
  let diff;
  if(day===0) diff=-2; else if(day===6) diff=-1; else diff = 5-day;
  const fri = new Date(d); fri.setDate(d.getDate()+diff);
  return fri.toISOString().slice(0,10);
}

function fmtMoney(n){ n = Number(n)||0; const neg = n<0; n=Math.abs(n); const s = '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); return neg? '('+s+')' : s; }

/* ---- generic sync helpers ---- */
async function upsertTable(table, rows){
  if(!rows.length) return;
  const { error } = await sbClient.from(table).upsert(rows);
  if(error) console.error('Supabase upsert failed on '+table, error);
}
async function deleteMissing(table, currentIds){
  const { data, error } = await sbClient.from(table).select('id');
  if(error){ console.error('Supabase select failed on '+table, error); return; }
  const keep = new Set(currentIds);
  const existing = data||[];
  const toDelete = existing.map(r=>r.id).filter(id=>!keep.has(id));
  if(!toDelete.length) return;
  if(existing.length > 5 && toDelete.length / existing.length > 0.5){
    const msg = `Save blocked as a safety measure: it would have deleted ${toDelete.length} of ${existing.length} rows in "${table}" in one go — more than half the table. Nothing was deleted. This usually means this browser tab's data is out of sync with the database (e.g. another device saved changes since this tab last loaded) rather than an intentional bulk delete. Reload the page to get fresh data before making more changes. If you really do need to delete this many records at once, do it directly in the Supabase dashboard instead.`;
    console.error(msg);
    showDataSafetyWarning(msg);
    throw new Error(`Prune safety check blocked delete on "${table}" (${toDelete.length}/${existing.length})`);
  }
  const { error: delErr } = await sbClient.from(table).delete().in('id', toDelete);
  if(delErr) console.error('Supabase delete failed on '+table, delErr);
}
async function replaceChildren(table, parentField, parentIds, rows){
  if(parentIds.length){
    const { count, error: countErr } = await sbClient.from(table).select('id', {count:'exact', head:true}).in(parentField, parentIds);
    if(countErr) console.error('Supabase count failed on '+table, countErr);
    const existingCount = count||0;
    if(existingCount > 5 && rows.length < existingCount*0.5){
      const msg = `Save blocked as a safety measure: it would have replaced ${existingCount} existing "${table}" rows with only ${rows.length} — more than half would be lost. Nothing was changed. This usually means this browser tab's data is out of sync with the database (e.g. another device saved changes since this tab last loaded). Reload the page to get fresh data before making more changes.`;
      console.error(msg);
      showDataSafetyWarning(msg);
      throw new Error(`Prune safety check blocked replace on "${table}" (${rows.length}/${existingCount})`);
    }
    const { error } = await sbClient.from(table).delete().in(parentField, parentIds);
    if(error) console.error('Supabase delete-children failed on '+table, error);
  }
  if(rows.length){
    const { error } = await sbClient.from(table).insert(rows);
    if(error) console.error('Supabase insert-children failed on '+table, error);
  }
}

    {company:'NNL', counter: state.invoiceCounter.NNL||1000},
    {company:'NFS', counter: state.invoiceCounter.NFS||1000}
  ]);
}

/* ---- attachment files (client/pit/compliance uploads) ----
   Managed independently of the routine full-state sync above: uploads/deletes
   happen immediately against Storage + their own table the moment the user
   acts, rather than being folded into persist()'s "re-sync everything"
   cycle — that cycle runs on every unrelated edit anywhere in the app, and
   redoing a delete-all-then-reinsert of every attachment row each time would
   be wasteful and would repeatedly re-trigger the prune safety check for no
   reason. */
const ATTACHMENT_TABLE_BY_TYPE = { client:'client_attachments', pit:'pit_attachments', compliance:'compliance_attachments' };
const ATTACHMENT_PARENT_FIELD_BY_TYPE = { client:'client_id', pit:'pit_id', compliance:'compliance_id' };

function compressImageFile(file){
  return new Promise((resolve)=>{
    if(!file.type.startsWith('image/')){ resolve(file); return; }
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      URL.revokeObjectURL(url);
      const MAX_DIM = 1600;
      let { width, height } = img;
      if(width > MAX_DIM || height > MAX_DIM){
        const scale = MAX_DIM / Math.max(width, height);
        width = Math.round(width*scale); height = Math.round(height*scale);
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      canvas.toBlob((blob)=>{
        resolve(blob ? new File([blob], file.name.replace(/\.[^.]+$/, '.jpg'), {type:'image/jpeg'}) : file);
      }, 'image/jpeg', 0.8);
    };
    img.onerror = ()=> resolve(file);
    img.src = url;
  });
}
async function uploadAttachment(entityType, parentId, file){
  const compressed = await compressImageFile(file);
  const table = ATTACHMENT_TABLE_BY_TYPE[entityType];
  const parentField = ATTACHMENT_PARENT_FIELD_BY_TYPE[entityType];
  const safeName = compressed.name.replace(/[^a-zA-Z0-9._-]/g, '_');
  const storagePath = `${entityType}/${parentId}/${uid()}-${safeName}`;
  const { error: upErr } = await sbClient.storage.from('attachments').upload(storagePath, compressed, { contentType: compressed.type });
  if(upErr) throw upErr;
  const row = { id: uid(), [parentField]: parentId, file_name: file.name, storage_path: storagePath, mime_type: compressed.type, uploaded_at: new Date().toISOString() };
  const { error: dbErr } = await sbClient.from(table).insert(row);
  if(dbErr){ await sbClient.storage.from('attachments').remove([storagePath]); throw dbErr; }
  return rowToAttachment(row);
}
async function deleteAttachment(entityType, attachment){
  const table = ATTACHMENT_TABLE_BY_TYPE[entityType];
  await sbClient.storage.from('attachments').remove([attachment.storagePath]);
  const { error } = await sbClient.from(table).delete().eq('id', attachment.id);
  if(error) throw error;
}
async function getAttachmentUrl(attachment){
  const { data, error } = await sbClient.storage.from('attachments').createSignedUrl(attachment.storagePath, 300);
  if(error) throw error;
  return data.signedUrl;
}
function findAttachmentParentRecord(entityType, parentId){
  if(entityType==='client') return state.clients.find(c=>c.id===parentId);
  if(entityType==='pit') return state.pits.find(p=>p.id===parentId);
  if(entityType==='compliance') return state.compliance.find(c=>c.id===parentId);
}
function renderAttachmentsSection(entityType, parentId, attachments){
  if(!parentId) return `<div class="note" style="margin-top:14px;">Save this first, then you can attach files (price sheets, business cards, documents — images or PDFs).</div>`;
  const list = attachments||[];
  return `
  <div style="margin-top:14px;">
    <label style="font-size:12px; font-weight:700; color:#5C7085; display:block; margin-bottom:6px;">Attached Files</label>
    <input type="file" id="att-file-${entityType}-${parentId}" accept="image/*,application/pdf" multiple style="display:none;">
    <button class="btn btn-ghost btn-sm" data-att-upload="${entityType}|${parentId}">📎 Upload File(s)</button>
    <span id="att-status-${entityType}-${parentId}" style="font-size:12px; color:#5C7085; margin-left:8px;"></span>
    ${list.length? `<div class="tablewrap" style="margin-top:8px;"><table><thead><tr><th>File</th><th>Uploaded</th><th></th></tr></thead><tbody>
      ${list.map(a=>`<tr><td>${(a.fileName||'').replace(/</g,'&lt;')}</td><td>${fmtDate((a.uploadedAt||'').slice(0,10))}</td><td>
        <button class="btn btn-ghost btn-sm" data-att-view="${entityType}|${a.id}">View</button>
        <button class="btn btn-danger btn-sm" data-att-del="${entityType}|${parentId}|${a.id}">Delete</button>
      </td></tr>`).join('')}
    </tbody></table></div>` : `<div class="note" style="margin-top:8px;">No files attached yet.</div>`}
  </div>`;
}
function wireAttachmentHandlers(entityType, parentId){
  if(!parentId) return;
  const uploadBtn = document.querySelector(`[data-att-upload="${entityType}|${parentId}"]`);
  const fileInput = document.getElementById(`att-file-${entityType}-${parentId}`);
  const statusEl = document.getElementById(`att-status-${entityType}-${parentId}`);
  if(uploadBtn && fileInput){
    uploadBtn.onclick = ()=> fileInput.click();
    fileInput.onchange = async ()=>{
      const files = [...fileInput.files];
      if(!files.length) return;
      const record = findAttachmentParentRecord(entityType, parentId);
      if(!record) return;
      record.attachments = record.attachments || [];
      let ok=0, failed=0;
      for(const file of files){
        if(statusEl) statusEl.textContent = `Uploading ${ok+failed+1} of ${files.length}…`;
        try{
          const att = await uploadAttachment(entityType, parentId, file);
          record.attachments.push(att);
          ok++;
        }catch(e){ failed++; }
      }
      if(statusEl) statusEl.textContent = failed? `Uploaded ${ok}, ${failed} failed — check file size/type and try again.` : '';
      render();
    };
  }
  document.querySelectorAll(`[data-att-view^="${entityType}|"]`).forEach(b=>{
    b.onclick = async ()=>{
      const attId = b.dataset.attView.split('|')[1];
      const record = findAttachmentParentRecord(entityType, parentId);
      const att = record && (record.attachments||[]).find(a=>a.id===attId);
      if(!att) return;
      try{
        const url = await getAttachmentUrl(att);
        window.open(url, '_blank');
      }catch(e){ alert('Could not open file: '+e.message); }
    };
  });
  document.querySelectorAll(`[data-att-del^="${entityType}|${parentId}|"]`).forEach(b=>{
    b.onclick = ()=>{
      const attId = b.dataset.attDel.split('|')[2];
      const record = findAttachmentParentRecord(entityType, parentId);
      const att = record && (record.attachments||[]).find(a=>a.id===attId);
      if(!att) return;
      showConfirm(`Delete "${att.fileName}"? This can't be undone.`, async ()=>{
        try{
          await deleteAttachment(entityType, att);
          record.attachments = (record.attachments||[]).filter(a=>a.id!==attId);
          render();
        }catch(e){ alert('Could not delete file: '+e.message); }
      });
    };
  });
}

// Tracks whether loadState() has actually finished populating `state` from
// Supabase. persist() refuses to run before this is true — every table sync is a
// "delete anything not in the current in-memory list" diff against the database,
// so calling it while `state` is still incomplete (e.g. right after a fresh page
// load, before the fetch resolves) would wipe out real rows that just hadn't been
// loaded into memory yet. This isn't reachable through normal UI use (nothing is
// even clickable until render() has run at the end of loadState()), but it's cheap,
// real insurance against exactly that failure mode from any other code path.
let initialLoadComplete = false;
async function loadState(){
  try{
    const { count, error } = await sbClient.from('pits').select('id', {count:'exact', head:true});
    if(error) throw error;
    if(!count){
      // Fresh database — push this app's built-in starter data (the 66 pits,
      // compliance defaults, annual items) up to Supabase once.
      await syncStateToSupabase();
    } else {
      await fetchStateFromSupabase();
    }
  }catch(e){
    console.error('Supabase load failed', e);
    const main = document.getElementById('main');
    if(main) main.insertAdjacentHTML('afterbegin', `<div style="background:#FDEDEC;border:1.5px solid var(--bad-500);color:var(--bad-500);padding:12px 16px;border-radius:8px;margin-bottom:14px;font-size:13px;"><strong>Could not connect to the database:</strong> ${((e&&e.message)||e+'').replace(/</g,'&lt;')}. Check your internet connection and reload.</div>`);
  }
  initialLoadComplete = true;
  render();
}

let saveTimer = null;
function persist(){
  if(!initialLoadComplete){
    console.error('persist() called before initial data load finished — refusing to save to avoid wiping unloaded data. This should never happen through normal use of the app.');
    return;
  }
  document.getElementById('savetext').textContent = 'Saving…';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{
      await syncStateToSupabase();
      document.getElementById('savetext').textContent = 'Saved automatically';
    }catch(e){
      console.error('Supabase save failed', e);
      document.getElementById('savetext').textContent = 'Save failed — retry';
    }
  }, 300);
}

/* ============================= COMPUTED HELPERS ============================= */
function computeLoadFinancials(l){
  const qty = Number(l.qty)||0, rate = Number(l.rate)||0;
  l.revenue = qty*rate;
  const driverRate = Number(l.driverRate)||0;
  if(l.company==='NNL' && l.driverType!=='Independent Driver'){
    // Company drivers (the default/majority case): automatic 30% split.
    // Normally 30% of the broker revenue, but if this driver has their own
    // rate that differs from the broker rate, the 30% comes out of THEIR
    // rate instead (e.g. driver rate $6/yd vs broker rate $6.35/yd — the
    // driver's 30% cut is based on the $6, not the $6.35).
    const driverBasis = driverRate>0 ? qty*driverRate : l.revenue;
    l.driverPay = +(driverBasis*0.3).toFixed(2);
  } else {
    // Independent drivers (both companies) and all NFS loads: paid their
    // own per-unit rate in full, no cut — multiplied by this load's quantity
    // (same as how the broker Rate becomes revenue).
    l.driverPay = +(qty*driverRate).toFixed(2);
  }
  l.net = +(l.revenue - l.driverPay).toFixed(2);
  return l;
}
function loadsFor(company){ return state.loads.filter(l=>l.company===company); }
function findDuplicateTicket(company, ticket, excludeId){
  const t = (ticket||'').toString().trim();
  if(!t) return null;
  return state.loads.find(l => l.company===company && l.id!==excludeId && (l.ticket||'').toString().trim()===t) || null;
}
function findAllDuplicateTickets(company){
  const groups = {};
  loadsFor(company).forEach(l=>{
    const t = (l.ticket||'').toString().trim();
    if(!t) return;
    (groups[t] = groups[t]||[]).push(l);
  });
  return Object.entries(groups).filter(([,items])=>items.length>1).sort((a,b)=>a[0].localeCompare(b[0]));
}
let dupTicketCheck = { NNL: null, NFS: null };
function renderDupTicketPanel(company){
  const results = dupTicketCheck[company];
  if(results===null) return '';
  if(!results.length) return `<div class="note" style="margin-bottom:14px; border-color:var(--good-500,#2E7D32);">✓ No duplicate ticket numbers found.</div>`;
  const partyLabel = company==='NNL' ? 'Broker' : 'Client';
  return `
  <div class="card" style="border-color:var(--bad-500,#C0362C); margin-bottom:14px;">
    <h2>⚠ Duplicate Ticket Numbers <span class="tag">${results.length} ticket number(s) used more than once</span></h2>
    ${results.map(([ticket,items])=>`
      <div style="margin-bottom:10px;">
        <div style="font-weight:700; margin-bottom:4px;">Ticket #${ticket} — used ${items.length} times</div>
        <div class="tablewrap"><table><thead><tr><th>Date</th><th>${partyLabel}</th><th>Qty</th><th>Revenue</th><th></th></tr></thead><tbody>
          ${items.map(l=>`<tr><td>${fmtDate(l.date)}</td><td>${l.party||l.broker||''}</td><td class="num">${l.qty||''}</td><td class="num">${fmtMoney(l.revenue)}</td><td><button class="btn btn-ghost btn-sm" data-edit-load="${l.id}">Edit</button></td></tr>`).join('')}
        </tbody></table></div>
      </div>
    `).join('')}
  </div>`;
}
function sum(arr, key){ return arr.reduce((a,b)=>a+(Number(b[key])||0),0); }
function groupBy(arr, key){
  const g = {};
  arr.forEach(x=>{ const k = x[key]||'—'; (g[k]=g[k]||[]).push(x); });
  return g;
}

    else if(activeTab==='clients') main.innerHTML = renderClientsPitsTab();
    else if(activeTab==='salesteam') main.innerHTML = renderSalesTeamTab();
    else if(activeTab==='weekly') main.innerHTML = renderWeeklyTab();
    else if(activeTab==='invoices') main.innerHTML = renderInvoicesTab();
    else if(activeTab==='annual') main.innerHTML = renderAnnualTab();
    else if(activeTab==='reports-nnl') main.innerHTML = renderCompanyReportsTab('NNL');
    else if(activeTab==='reports-nfs') main.innerHTML = renderCompanyReportsTab('NFS');
    attachHandlers();
  }catch(err){
    console.error(err);
    const main = document.getElementById('main');
    if(main) main.insertAdjacentHTML('afterbegin', `<div style="background:#FDEDEC;border:1.5px solid var(--bad-500);color:var(--bad-500);padding:12px 16px;border-radius:8px;margin-bottom:14px;font-size:13px;"><strong>This tab hit an error and couldn't fully render:</strong> ${((err&&err.message)||err+'').replace(/</g,'&lt;')}<br>Your data wasn't lost — try switching tabs and back. If it keeps happening, note what you were doing when it appeared.</div>`);
  }
}

/* ============================= OVERDUE ALERTS ============================= */
function getOverdueInvoices(){
  const today = new Date().toISOString().slice(0,10);
  // Anything not marked Paid counts as overdue right away — no grace period.
  const flagged = state.loads.filter(l=> l.status!=='Paid' && l.date);
  const groups = {};
  flagged.forEach(l=>{
    const key = l.company+'|'+l.party;
    if(!groups[key]) groups[key] = {company:l.company, party:l.party, items:[]};
    groups[key].items.push(l);
  });
  return Object.values(groups).map(g=>{
    const loadDates = g.items.map(l=>l.date).sort();
    const oldestDate = loadDates[0];
    const daysOverdue = Math.max(0, Math.round((new Date(today)-new Date(oldestDate))/86400000));
    return { ...g, total: sum(g.items,'revenue'), daysOverdue, oldestDate };
  }).sort((a,b)=> b.daysOverdue - a.daysOverdue);
}
function renderOverdueBanner(){
  const overdue = getOverdueInvoices();
  if(!overdue.length){
    return `<div class="card"><div class="balancebar ok"><span>All caught up — nothing outstanding ✓</span><span></span></div></div>`;
  }
  const totalOverdue = sum(overdue,'total');
  return `
  <div class="card" style="border-color:#F3B9B4;">
    <h2 style="color:var(--bad-500);">⚠ Overdue — Not Yet Paid <span class="tag">${fmtMoney(totalOverdue)} outstanding</span></h2>
    <div class="tablewrap"><table>
      <thead><tr><th>Company</th><th>Broker / Client</th><th>Days Outstanding</th><th>Amount</th></tr></thead>
      <tbody>
        ${overdue.map(o=>`<tr><td>${o.company}</td><td><strong>${o.party}</strong></td><td class="num" style="color:var(--bad-500);font-weight:700;">${o.daysOverdue}d</td><td class="num">${fmtMoney(o.total)}</td></tr>`).join('')}
      </tbody>
    </table></div>
  </div>`;
}

function refreshJobTicketRows(company){

function attachJobTicketRowHandlers(company){
  const region = document.getElementById('job-ticket-rows-'+company);
  if(!region) return;
  jobTicketRows[company].forEach((r,idx)=>{
    const t = document.getElementById(`jt-ticket-${company}-${idx}`);
    const tr = document.getElementById(`jt-truck-${company}-${idx}`);
    const dr = document.getElementById(`jt-driver-${company}-${idx}`);
    const q = document.getElementById(`jt-qty-${company}-${idx}`);
    if(t) t.oninput = ()=> jobTicketRows[company][idx].ticket = t.value;
    if(tr) tr.oninput = ()=> jobTicketRows[company][idx].truck = tr.value;
    if(dr) dr.oninput = ()=> jobTicketRows[company][idx].driver = dr.value;
    if(q) q.oninput = ()=>{ jobTicketRows[company][idx].qty = q.value; refreshRevenuePreview(company, idx); refreshTicketTotals(company); };
  });
  region.querySelectorAll('[data-remove-ticket-row]').forEach(b=>b.onclick=()=>{
    const idx = Number(b.dataset.removeTicketRow);
    jobTicketRows[company].splice(idx,1);
    if(!jobTicketRows[company].length) jobTicketRows[company].push(mkEmptyTicketRow());
    refreshJobTicketRows(company);
  });
}
function refreshRevenuePreview(company, idx){
  const row = document.querySelectorAll(`#job-ticket-rows-${company} tbody tr`)[idx];
  if(!row) return;
  const rate = Number(jobShared[company].rate)||0;
  const qty = Number(jobTicketRows[company][idx].qty)||0;
  const previewCol = jobShared[company].sameTruckDriver ? 3 : 5;
  const cell = row.querySelector(`td:nth-child(${previewCol})`);
  if(cell) cell.textContent = qty ? fmtMoney(qty*rate) : '—';
}
function refreshAllRevenuePreviews(company){
  jobTicketRows[company].forEach((r,idx)=>refreshRevenuePreview(company,idx));
  refreshTicketTotals(company);
}
function refreshTicketTotals(company){
  const rate = Number(jobShared[company].rate)||0;
  const totalQty = jobTicketRows[company].reduce((sum,r)=> sum + (Number(r.qty)||0), 0);
  const totalRevenue = jobTicketRows[company].reduce((sum,r)=> sum + (Number(r.qty)||0)*rate, 0);
  const qtyCell = document.getElementById(`jt-total-qty-${company}`);
  const revCell = document.getElementById(`jt-total-revenue-${company}`);
  if(qtyCell) qtyCell.textContent = totalQty || '—';
  if(revCell) revCell.textContent = totalRevenue ? fmtMoney(totalRevenue) : '—';
}

function attachJobSharedHandlers(company){
  const s = jobShared[company];
  const bind = (id, key, onchange) => {
    const el = document.getElementById(id);
    if(el) el.oninput = ()=>{ s[key]=el.value; if(onchange) onchange(); };
  };
  bind('js-date','date'); bind('js-party','party');
  bind('js-pit','pit'); bind('js-customer','customer'); bind('js-jobname','jobName');
  bind('js-broker','broker'); bind('js-material','material'); bind('js-jobsource','jobSource'); bind('js-drivertype','driverType');
  bind('js-paymenttype','paymentType');
  bind('js-rate','rate', ()=>refreshAllRevenuePreviews(company));
  bind('js-driverrate','driverRate'); bind('js-status','status');
  bind('js-sharedtruck','sharedTruck'); bind('js-shareddriver','sharedDriver');

  const sameTruckDriverBox = document.getElementById('js-sametruckdriver');
  if(sameTruckDriverBox) sameTruckDriverBox.onchange = ()=>{

  };

  if(addRowBtn) addRowBtn.onclick = ()=>{

    jobTicketRows[company].push(mkEmptyTicketRow({truck: firstTruck?firstTruck.value:'', driver: firstDriver?firstDriver.value:''}));

  };

    });

}
function refreshJobTicketCard(company){

function saveAllTickets(company){
  const s = jobShared[company];
  if(!s.date || !s.party){ alert(`Add a date and ${company==='NNL'?'broker':'client'} name before saving tickets.`); return; }
  if(!s.rate){ alert('Add a rate before saving tickets.'); return; }
  const validRows = jobTicketRows[company].filter(r => String(r.qty).trim() !== '');
  if(!validRows.length){ alert('Add at least one ticket with a quantity.'); return; }

  // Duplicate ticket check: against loads already saved, and within this batch itself.
  const seenInBatch = {};
  const dupTickets = new Set();
  validRows.forEach(r=>{
    const t = (r.ticket||'').toString().trim();
    if(!t) return;
    if(seenInBatch[t]) dupTickets.add(t);
    seenInBatch[t] = true;
    if(findDuplicateTicket(company, t, null)) dupTickets.add(t);
  });

  const finishSave = ()=>{
    let created = 0;
    validRows.forEach(r=>{
      const l = {
        id: uid(), company, date: s.date, party: s.party, ticket: r.ticket,
        truck: s.sameTruckDriver ? s.sharedTruck : r.truck,
        driver: s.sameTruckDriver ? s.sharedDriver : r.driver,
        paymentType: s.paymentType, qty: r.qty, rate: s.rate,
        status: s.status, invoiceNum:'', datePaid:'', notes:''
      };
      if(company==='NNL'){
        l.pit = s.pit; l.customer = s.customer; l.jobName = s.jobName; l.driverType = s.driverType; l.driverRate = s.driverRate;
      }
      if(company==='NFS'){
        l.broker = s.broker; l.jobName = s.jobName; l.material = s.material; l.jobSource = s.jobSource; l.driverType = s.driverType; l.driverRate = s.driverRate;
      }
      computeLoadFinancials(l);
      state.loads.push(l);
      created++;
    });
    persist();
    jobTicketRows[company] = [mkEmptyTicketRow(),mkEmptyTicketRow(),mkEmptyTicketRow()];
    alert(`Saved ${created} ticket(s) for ${s.party}.`);
    render();
  };

  if(dupTickets.size){
    showConfirm(`Ticket # already used: ${[...dupTickets].join(', ')}. Save these tickets anyway?`, finishSave);
  } else {
    finishSave();
  }
}

function distinctVals(company, key){
  const s = new Set();
  loadsFor(company).forEach(l=>{ const v=(l[key]||'').toString().trim(); if(v) s.add(v); });

}

let truckMaintenanceFilter = 'All';
function getAllTrucks(){
  const s = new Set();
  state.loads.forEach(l=>{ if(l.truck && MY_TRUCKS.includes(l.truck)) s.add(l.truck); });
  state.expenses.forEach(e=>{ if(e.truck && MY_TRUCKS.includes(e.truck)) s.add(e.truck); });
  return [...s].sort();
}
function maintenanceEventsForTruck(truck){
  return state.expenses.filter(e=>e.truck===truck && MAINTENANCE_CATEGORIES.includes(e.category))
                        .sort((a,b)=>(b.date||'').localeCompare(a.date||''));
}
function daysAgo(dateStr){
  if(!dateStr) return null;
  return Math.round((new Date() - new Date(dateStr+'T00:00:00')) / 86400000);
}
function lastByCategory(truck, cats){
  const events = maintenanceEventsForTruck(truck);
  return events.find(e => cats.includes(e.category)) || null;
}

function renderTruckMaintenanceSection(){
  const trucks = getAllTrucks();
  const selected = truckMaintenanceFilter;
  return `
    <h2>Truck Maintenance Tracker <span class="tag">Tires · Oil · Brakes · Transmission</span></h2>
    <div class="field" style="max-width:220px; margin-bottom:16px;">

    </div>
    ${!trucks.length ? `<div class="empty">Log a truck # on a load or expense first, and this section will populate automatically.</div>` :
      (selected==='All' ? renderAllTrucksMaintenanceSummary(trucks) : renderSingleTruckMaintenance(selected))}

}

function renderAllTrucksMaintenanceSummary(trucks){
  const rows = trucks.map(t=>{
    const tire = lastByCategory(t,['Tires']);
    const oil = lastByCategory(t,['Oil Change']);
    const brakes = lastByCategory(t,['Brakes']);
    const total = sum(maintenanceEventsForTruck(t),'amount');
    return { truck:t, tire, oil, brakes, total, count: maintenanceEventsForTruck(t).length };
  });
  const cell = ev => ev ? `${fmtDate(ev.date)} <span style="color:#9FB0C3;">(${daysAgo(ev.date)}d ago)</span>` : `<span style="color:#9FB0C3;">— none logged</span>`;
  return `
    <div class="tablewrap">
    <table>
      <thead><tr><th>Truck</th><th>Last Tires</th><th>Last Oil Change</th><th>Last Brakes</th><th># Maintenance Events</th><th>Total Spent</th></tr></thead>
      <tbody>
        ${rows.map(r=>`<tr><td><strong>${r.truck}</strong></td><td>${cell(r.tire)}</td><td>${cell(r.oil)}</td><td>${cell(r.brakes)}</td><td class="num">${r.count}</td><td class="num">${fmtMoney(r.total)}</td></tr>`).join('')}
      </tbody>
    </table>
    </div>
  `;
}

function renderSingleTruckMaintenance(truck){
  const events = maintenanceEventsForTruck(truck);
  const total = sum(events,'amount');
  const cats = ['Tires','Oil Change','Brakes','Transmission'];
  const cards = cats.map(cat=>{
    const ev = lastByCategory(truck,[cat]);
    return `<div class="stat" style="background:var(--navy-800)">
      <div class="label">Last ${cat}</div>
      <div class="value" style="font-size:16px;">${ev? fmtDate(ev.date) : '— none'}</div>
      <div class="sub">${ev? daysAgo(ev.date)+' days ago · '+fmtMoney(ev.amount) : 'Not logged yet'}</div>

  }).join('');

function daysUntil(dateStr){
  if(!dateStr) return null;
  return Math.round((new Date(dateStr+'T00:00:00') - new Date(new Date().toDateString())) / 86400000);
}
function complianceStatus(row){
  const today = new Date().toISOString().slice(0,10);
  const curYear = new Date().getFullYear();
  const issues = [];
  if(!row.coiDate) issues.push('Missing COI');
  else if(row.coiDate < today) issues.push('COI Expired');
  else if(daysUntil(row.coiDate) <= 30) issues.push('COI Expiring Soon');

  if(!row.w9Year) issues.push('Missing W-9');
  else if(Number(row.w9Year) < curYear) issues.push('W-9 Outdated');

  if(!row.wcDate) issues.push('Missing WC');
  else if(row.wcDate < today) issues.push('WC Expired');
  else if(daysUntil(row.wcDate) <= 30) issues.push('WC Expiring Soon');

  if(!issues.length) return {label:'Complete', tone:'paid'};
  if(issues.some(i=>i.includes('Missing') || i.includes('Expired') && !i.includes('Soon'))) return {label:issues.join('; '), tone:'pending'};
  return {label:issues.join('; '), tone:'invoiced'};
}

/* ============================= PIT MAP & ROUTING TAB ============================= */
// Free-tier stack: Leaflet + OpenStreetMap tiles for the map (no key needed),
// Nominatim for geocoding addresses (no key, please keep volume light), and
// OpenRouteService for driving distance/time (free key, no credit card).
function distinctPitMaterials(){
  const s = new Set();
  state.pits.forEach(p=>(p.materials||[]).forEach(m=>{ if(m.name) s.add(m.name.trim()); }));
  return [...s].sort((a,b)=>a.localeCompare(b));
}
// Reps often type a shorthand version of a material name ("Fill", "A3 Fill") rather
// than picking the exact catalog spelling ("Fill Dirt", "A-3 Fill") from the
// suggestions — matching on exact equality silently found nothing in that case. This
// normalizes away spacing/punctuation/case and matches as a substring instead.
function normMaterialName(s){ return (s||'').toLowerCase().replace(/[^a-z0-9]/g,''); }
function materialQueryMatches(catalogName){
  const norm = normMaterialName(catalogName);
  return pitMapQuery.materials.some(q => norm.includes(normMaterialName(q)));
}
function pitsMissingLocation(){
  return state.pits.filter(p=>p.address && (p.lat==null || p.lng==null));
}
async function geocodeAddress(address){
  if(!address) return null;
  // Primary: OpenRouteService's own geocoder — same key already used for routing,
  // better free-tier headroom, actually meant for this kind of app usage.
  if(state.orsApiKey){
    try{
      const url = `https://api.openrouteservice.org/geocode/search?api_key=${encodeURIComponent(state.orsApiKey)}&text=${encodeURIComponent(address)}&size=1&layers=address`;
      const res = await fetch(url);
      if(res.ok){
        const data = await res.json();
        const feature = data.features && data.features[0];
        if(feature) return { lat:feature.geometry.coordinates[1], lng:feature.geometry.coordinates[0] };
      }
    }catch(e){ /* OpenRouteService unreachable/down — fall through to the backup below */ }
  }
  // Backup: OpenStreetMap's Nominatim (no key needed). Only used here as a fallback
  // when OpenRouteService itself is unreachable — not meant for routine heavy/automated
  // use, so it stays secondary rather than the primary geocoder.
  try{
    const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(address)}`;
    const res = await fetch(url, { headers:{ 'Accept':'application/json' } });
    if(!res.ok) return null;
    const data = await res.json();
    if(data && data[0]) return { lat:Number(data[0].lat), lng:Number(data[0].lon) };
  }catch(e){ /* both providers failed — caller decides what to tell the user */ }
  return null;
}
async function geocodeAllMissingPits(){
  const missing = pitsMissingLocation();
  if(!missing.length){ alert('All pits with an address are already located on the map.'); return; }
  if(!state.orsApiKey){ alert('Add a free OpenRouteService API key below first — it\'s used for both locating pits and calculating driving distance/time.'); return; }
  const btn = document.getElementById('pm-locate-missing');
  if(btn){ btn.disabled = true; btn.textContent = 'Locating…'; }
  for(const p of missing){
    const loc = await geocodeAddress(p.address.toLowerCase().includes('fl') ? p.address : p.address+', FL');
    if(loc){ p.lat = loc.lat; p.lng = loc.lng; }
    await new Promise(r=>setTimeout(r, 1600)); // stay comfortably under OpenRouteService's 40 requests/minute limit
  }
  persist(); render();
}
async function findNearbyPits(){
  pitMapQuery.address = (document.getElementById('pm-address')?.value||'').trim();
  pitMapQuery.jobName = (document.getElementById('pm-jobname')?.value||'').trim();
  pitMapQuery.maxMiles = (document.getElementById('pm-maxmiles')?.value||'').trim();
  if(!pitMapQuery.address){ alert('Enter the project/job address first.'); return; }
  if(!state.orsApiKey){ alert('Add a free OpenRouteService API key below first — it\'s needed to calculate driving distance and time.'); return; }

  const locatedPits = state.pits.filter(p=>p.lat!=null && p.lng!=null);
  if(!locatedPits.length){ alert('No pits are located on the map yet. Click "Locate pits on map" above first (it can take a minute or two to geocode every pit), then try your search again.'); return; }
  const candidates = locatedPits.filter(p=>{
    if(!pitMapQuery.materials.length) return true;
    return (p.materials||[]).some(m=>materialQueryMatches(m.name));
  });
  if(!candidates.length){ alert('None of the located pits carry any of those materials yet. Double-check the spelling/material name(s), or add it to the pit on the Contacts and Pits tab, then use "Locate pits on map" above.'); return; }

  const btn = document.getElementById('pm-find');
  if(btn){ btn.disabled = true; btn.textContent = 'Searching…'; }
  // Same reasoning as pit-address geocoding elsewhere: without a state, a geocoder can
  // match a same-named place anywhere in the world (e.g. "Sorrento" resolved to Italy
  // instead of Sorrento, FL, making every pit look unroutable). Assume Florida unless
  // the address already says otherwise.
  const jobAddressForGeocoding = pitMapQuery.address.toLowerCase().includes('fl') ? pitMapQuery.address : pitMapQuery.address+', FL';
  const jobLoc = await geocodeAddress(jobAddressForGeocoding);
  if(!jobLoc){
    alert('Could not locate that address — double check it and try again.');
    if(btn){ btn.disabled=false; btn.textContent='Find Nearby Pits'; }
    return;
  }
  try{
    const locations = [[jobLoc.lng, jobLoc.lat], ...candidates.map(p=>[p.lng, p.lat])];
    const res = await fetch('https://api.openrouteservice.org/v2/matrix/driving-car', {
      method:'POST',
      headers:{ 'Authorization': state.orsApiKey, 'Content-Type':'application/json' },
      body: JSON.stringify({ locations, sources:[0], destinations: candidates.map((_,i)=>i+1), metrics:['distance','duration'], units:'mi' })
    });
    if(res.status===429) throw new Error("You've hit OpenRouteService's rate/daily limit for this key. This key is shared across everyone using the app — wait a bit and try again, or check usage at openrouteservice.org.");
    if(res.status===401 || res.status===403) throw new Error('Your OpenRouteService API key was rejected — double-check it below.');
    if(!res.ok) throw new Error('request failed ('+res.status+').');
    const data = await res.json();
    const distances = data.distances[0], durations = data.durations[0];
    // OpenRouteService returns null (not an error) for a source/destination pair it
    // can't find a road route between — usually the job address landed somewhere the
    // routing graph can't connect to (too vague an address, water, an unmapped area).
    // null*2 silently evaluates to 0, which used to show as a misleading "0 mi / $0.00"
    // instead of flagging the real problem — so drop unroutable pits instead.
    const unroutableCount = candidates.filter((_,i)=>distances[i]==null || durations[i]==null).length;
    pitMapResults = candidates
      .map((p,i)=>({ pit:p, roundTripMiles: distances[i]*2, roundTripMinutes: (durations[i]/60)*2 }))
      .filter((_,i)=>distances[i]!=null && durations[i]!=null)
      .sort((a,b)=>a.roundTripMiles-b.roundTripMiles);
    pitMapSelectedPitIds = new Set();
    pitMapJobLocation = jobLoc;
    pitMapRoutes = {};
    if(!pitMapResults.length){
      alert('OpenRouteService couldn\'t find a driving route from that address to any pit. This usually means the address is too vague or landed somewhere the map can\'t connect to a road — try a fuller street address (house/lot number, street, city, state).');
    } else if(unroutableCount){
      alert(`Heads up: ${unroutableCount} pit(s) couldn't be reached by road from that address and were left out of the results below.`);
    }
  }catch(e){
    alert('Distance lookup failed: '+e.message);
  }
  render();
}
function computePitMapCalcFor(sel){
  if(!sel) return null;
  const c = pitMapCalc;
  const cycleMinutes = sel.roundTripMinutes + (Number(c.loadMin)||0) + (Number(c.unloadMin)||0);
  const workdayMinutes = (Number(c.hours)||0)*60;
  const loadsPerDay = cycleMinutes>0 ? Math.max(1, Math.floor(workdayMinutes/cycleMinutes)) : 0;
  const dayRate = Number(c.dayRate)||0;
  const perLoad = loadsPerDay ? dayRate/loadsPerDay : 0;
  const capacity = Number(c.capacity)||0;
  const perUnit = capacity ? perLoad/capacity : null;
  const perHour = (Number(c.hours)||0) ? dayRate/Number(c.hours) : 0;
  const milesPerDay = sel.roundTripMiles*loadsPerDay;
  const perMile = milesPerDay>0 ? dayRate/milesPerDay : 0;
  return { cycleMinutes, loadsPerDay, perLoad, perUnit, perHour, perMile, belowFloor: perMile < TRUCK_MILE_MIN };
}
function promptAddPitToQuote(pitId){
  const jobName = (document.getElementById('pm-jobname')?.value||'').trim();
  if(!jobName){ alert('Enter a Job Name above first — quotes on the Pit Map are grouped by Job Name.'); return; }
  const result = pitMapResults.find(r=>r.pit.id===pitId);
  const calc = result ? computePitMapCalcFor(result) : null;
  // The "Per [Unit]" option used to always show whatever unit was picked in Rate
  // Calculator Settings (defaults to Tons) — so "Per Yard" would silently never
  // appear for a yards-priced material unless that global dropdown happened to
  // already be set to Yards. Base it on the actual matched materials' own units
  // instead. A broad search term (e.g. "Fill") can match several materials at one
  // pit that don't all share a unit (a yards-priced "Fill Dirt" and a tons-priced
  // "A-3 Structural Fill" at the same pit, say) — offer one option per distinct
  // unit found rather than collapsing to a single guess and hiding the rest.
  const pit = result ? result.pit : state.pits.find(p=>p.id===pitId);
  const pitMatches = pit && pitMapQuery.materials.length ? (pit.materials||[]).filter(m=>materialQueryMatches(m.name)) : [];
  const matchMaterial = pitMatches.length===1 ? pitMatches[0] : null;
  const matchedUnits = [...new Set(pitMatches.map(m=>m.unit).filter(u=>u==='Tons'||u==='Yards'))];
  const perUnitTypes = matchedUnits.length ? matchedUnits : [pitMapCalc.capacityUnit];
  const options = [
    { label:`Per Load — ${calc? fmtMoney(calc.perLoad) : '—'}/load`, value:'Loads' }
  ];
  if(calc && calc.perUnit!=null) perUnitTypes.forEach(u=>{
    const unitLabel = u.replace(/s$/,'');
    options.push({ label:`Per ${unitLabel} — ${fmtMoney(calc.perUnit)}/${unitLabel.toLowerCase()}`, value: u });
  });
  options.push({ label:`Per Hour — ${calc? fmtMoney(calc.perHour) : '—'}/hr`, value:'Hours' });
  showUnitPicker('How do you want to bill trucking for this material?', options, (unit)=>{
    addPitMapMaterialToQuote(pitId, unit, calc);
  });
}
function addPitMapMaterialToQuote(pitId, billUnit, calc){
  const pit = state.pits.find(p=>p.id===pitId);
  if(!pit) return;
  const jobName = (document.getElementById('pm-jobname')?.value||'').trim();
  const jobAddress = (document.getElementById('pm-address')?.value||'').trim();

  let q = state.quotes.find(x=>(x.jobName||'').trim().toLowerCase()===jobName.toLowerCase());
  if(!q){
    q = { id: uid(), date: new Date().toISOString().slice(0,10), client:'', jobName, jobAddress, submittedBy:'', status:'Submitted', notes:'', materials:[] };
    state.quotes.push(q);
  } else if(!q.jobAddress && jobAddress){
    q.jobAddress = jobAddress;
  }

  const line = mkEmptyMaterialLine();
  line.pit = pit.id;
  line.unit = billUnit;
  line.taxRate = pit.taxRate || '';
  // If exactly one of the searched materials matches this pit, pre-fill it. When
  // billing by Tons/Yards specifically, narrow to matches with that exact unit
  // first — e.g. a "Fill" search matching both a yards-priced and a tons-priced
  // material at the same pit is only ambiguous overall, not once the rep has
  // already told us (by picking "Per Yard") which one they mean.
  const pitMatchesAll = pitMapQuery.materials.length ? (pit.materials||[]).filter(m=>materialQueryMatches(m.name)) : [];
  const pitMatches = (billUnit==='Tons'||billUnit==='Yards') ? pitMatchesAll.filter(m=>m.unit===billUnit) : pitMatchesAll;
  const matchMaterial = pitMatches.length===1 ? pitMatches[0] : null;
  if(matchMaterial) line.material = matchMaterial.name;
  // Truck Capacity per Load (Rate Calculator Settings) doubles as "how much of this
  // material's own unit fits in one load" — same assumption the Per-[Unit] billing
  // label already relies on — so it's also what converts the catalog $/unit price
  // into an equivalent $/load or $/hour material cost below.
  const capacity = Number(pitMapCalc.capacity)||0;
  const catalogPrice = matchMaterial && matchMaterial.price!=='' && matchMaterial.price!=null ? Number(matchMaterial.price) : null;
  if(billUnit==='Loads'){
    line.truckingCost = calc? +calc.perLoad.toFixed(2) : '';
    if(catalogPrice!=null && capacity) line.price = +(catalogPrice * capacity).toFixed(2);
  }
  else if(billUnit==='Hours'){
    line.truckingCost = calc? +calc.perHour.toFixed(2) : '';
    const hours = Number(pitMapCalc.hours)||0;
    if(catalogPrice!=null && capacity && hours && calc) line.price = +(catalogPrice * capacity * (calc.loadsPerDay/hours)).toFixed(2);
  }
  else{
    line.truckingCost = calc && calc.perUnit!=null ? +calc.perUnit.toFixed(2) : '';
    if(matchMaterial) line.price = matchMaterial.price || ''; // catalog $/unit already matches the billing unit here
  }
  line.truckingMode = 'perUnit';
  q.materials.push(line);
  persist();

  activeTab = 'salesteam';
  salesTeamSubtab = 'quotes';
  startEditQuote(q.id);
  render();
  window.scrollTo(0,0);
}
function pitMapResultsInner(){
  if(!pitMapResults.length) return '';
  const maxMi = Number(pitMapQuery.maxMiles)||0;
  const shownResults = maxMi>0 ? pitMapResults.filter(r=>r.roundTripMiles<=maxMi) : pitMapResults;
  const hiddenCount = pitMapResults.length - shownResults.length;
  return `
    <div class="note" style="margin-top:14px;">Check "Compare" on 2+ pits to see their rate calculators side by side. "Add to Quote" builds (or adds another material to) the quote for the Job Name above — add as many pits/materials as the job needs.${hiddenCount? ` ${hiddenCount} pit(s) beyond ${maxMi} mi round trip are hidden — clear/raise the max distance above to see them.` : ''}</div>
    ${shownResults.length? `
    <div class="tablewrap">
    <table>
      <thead><tr><th>Pit</th><th>Materials</th><th>Round-trip Distance</th><th>Round-trip Drive Time</th><th></th></tr></thead>
      <tbody>
        ${shownResults.map(r=>{
          const all = (r.pit.materials||[]).filter(m=>m.name);
          const matched = pitMapQuery.materials.length ? all.filter(m=>materialQueryMatches(m.name)) : all;
          const shown = matched.slice(0,3);
          const extra = matched.length - shown.length;
          const materialsCell = shown.length
            ? shown.map(m=>`${m.name}: ${fmtPitPrice(m.price, m.unit)}`).join('<br>') + (extra>0? `<br><span style="color:#5C7085;">+${extra} more</span>` : '')
            : '—';
          return `<tr ${pitMapSelectedPitIds.has(r.pit.id)?'style="background:var(--steel-100);"':''}>
          <td><strong>${pitLabel(r.pit)}</strong></td>
          <td>${materialsCell}</td>
          <td class="num">${r.roundTripMiles.toFixed(1)} mi</td>
          <td class="num">${Math.round(r.roundTripMinutes)} min</td>
          <td style="white-space:nowrap;">
            <button class="btn ${pitMapSelectedPitIds.has(r.pit.id)?'btn-primary':'btn-ghost'} btn-sm" data-toggle-pit-calc="${r.pit.id}">${pitMapSelectedPitIds.has(r.pit.id)?'✓ Comparing':'Compare'}</button>
            <button class="btn btn-ghost btn-sm" data-add-to-quote="${r.pit.id}">Add to Quote</button>
          </td>
        </tr>`;}).join('')}
      </tbody>
    </table>
    </div>` : ''}
  `;
}
function attachPitMapResultsHandlers(){
  document.querySelectorAll('[data-toggle-pit-calc]').forEach(b=>b.onclick=()=>{
    const id = b.dataset.togglePitCalc;

    if(adding) pitMapSelectedPitIds.add(id); else pitMapSelectedPitIds.delete(id);

function initPitMapLeaflet(){
  const el = document.getElementById('pit-map-canvas');
  if(!el || typeof L==='undefined') return;
  if(pitLeafletMap){ pitLeafletMap.remove(); pitLeafletMap=null; }
  pitLeafletMap = L.map(el).setView([27.9, -81.7], 7); // centered on Florida
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors', maxZoom: 18
  }).addTo(pitLeafletMap);
  const located = state.pits.filter(p=>p.lat!=null && p.lng!=null);
  const bounds = [];
  located.forEach(p=>{
    const mats = (p.materials||[]).filter(m=>m.name).map(m=>`${m.name}: ${fmtPitPrice(m.price, m.unit)}`).join('<br>') || 'No materials listed';
    const dumps = (p.dumpFees||[]).filter(m=>m.name).map(m=>`${m.name}: ${fmtPitPrice(m.price, m.unit)}`).join('<br>');
    L.marker([p.lat, p.lng]).addTo(pitLeafletMap)
      .bindPopup(`<strong>${pitLabel(p)}</strong><br>${p.address||''}<br><br><u>Buy</u><br>${mats}${dumps? `<br><br><u>Dump</u><br>${dumps}` : ''}`);
    bounds.push([p.lat, p.lng]);
  });
  if(pitMapJobLocation){
    const jobIcon = L.divIcon({
      className:'', iconSize:[18,18], iconAnchor:[9,9],
      html:'<div style="background:#D8483D;width:16px;height:16px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 4px rgba(0,0,0,.5);"></div>'
    });
    L.marker([pitMapJobLocation.lat, pitMapJobLocation.lng], {icon:jobIcon}).addTo(pitLeafletMap)
      .bindPopup(`<strong>Job Site</strong><br>${pitMapQuery.address||''}`);
    bounds.push([pitMapJobLocation.lat, pitMapJobLocation.lng]);
  }
  pitMapSelectedPitIds.forEach(id=>{
    const coords = pitMapRoutes[id];
    if(!coords) return;
    const latlngs = coords.map(c=>[c[1],c[0]]);
    L.polyline(latlngs, {color: colorForComparedPit(id), weight:5, opacity:0.75}).addTo(pitLeafletMap);
    latlngs.forEach(ll=>bounds.push(ll));
  });
  if(bounds.length>1) pitLeafletMap.fitBounds(bounds, {padding:[30,30]});
}
async function ensurePitRoute(pitId){
  if(pitMapRoutes[pitId] || !pitMapJobLocation || !state.orsApiKey) return;
  const pit = state.pits.find(p=>p.id===pitId);
  if(!pit || pit.lat==null || pit.lng==null) return;
  try{
    const res = await fetch('https://api.openrouteservice.org/v2/directions/driving-car/geojson', {
      method:'POST',
      headers:{ 'Authorization': state.orsApiKey, 'Content-Type':'application/json' },
      body: JSON.stringify({ coordinates: [[pitMapJobLocation.lng, pitMapJobLocation.lat], [pit.lng, pit.lat]] })
    });
    if(!res.ok) return;
    const data = await res.json();
    pitMapRoutes[pitId] = data.features[0].geometry.coordinates;
    initPitMapLeaflet();
  }catch(e){ /* route line is a nice-to-have — silently skip if it fails */ }
}

const PROFIT_MARGIN = 0.18;
function computeMaterialLine(line){
  const qty = (line.qtyFinal!==undefined && line.qtyFinal!==null && line.qtyFinal!=='') ? Number(line.qtyFinal) : Number(line.qtyRequested)||0;
  const price = Number(line.price)||0, truckingRaw = Number(line.truckingCost)||0, taxRate = Number(line.taxRate)||0;
  const materialMode = line.materialMode || 'perUnit';
  const truckingMode = line.truckingMode || 'perUnit';
  line.materialCost = +((materialMode==='flat' ? price : qty * price)).toFixed(2);
  const truckingTotal = +((truckingMode==='flat' ? truckingRaw : qty * truckingRaw)).toFixed(2);
  line.truckingTotal = truckingTotal;
  line.taxAmount = +(line.materialCost * (taxRate/100)).toFixed(2);
  const autoProfit = +((line.materialCost + truckingTotal) * PROFIT_MARGIN).toFixed(2);
  line.profit = (line.profitOverride!==undefined && line.profitOverride!==null && line.profitOverride!=='')
    ? +(Number(line.profitOverride)).toFixed(2)
    : autoProfit;
  line.autoProfit = autoProfit;
  line.lineTotal = +(line.materialCost + line.taxAmount + truckingTotal + line.profit).toFixed(2);
  return line;
}
function computeDocTotals(doc){
  (doc.materials||[]).forEach(computeMaterialLine);
  doc.totalBilled = sum(doc.materials||[], 'lineTotal');
  doc.totalMaterial = sum(doc.materials||[], 'materialCost');
  doc.totalTax = sum(doc.materials||[], 'taxAmount');
  doc.totalTrucking = doc.materials? doc.materials.reduce((a,m)=>a+(Number(m.truckingTotal)||0),0) : 0;
  doc.totalProfit = sum(doc.materials||[], 'profit');
  return doc;
}
function unitLabelSales(unitType){

function completedLoadsForJob(job){
  const jn = (job.jobName||'').trim().toLowerCase();
  if(!jn) return [];
  return state.loads.filter(l=>l.company==='NFS' && l.material && (l.jobName||'').trim().toLowerCase()===jn);
}
function completedMaterialSummaryForJob(job){
  const loads = completedLoadsForJob(job);
  const groups = {};
  loads.forEach(l=>{
    const key = (l.material||'').trim()+'|'+l.paymentType;
    if(!groups[key]) groups[key] = { material:(l.material||'').trim(), paymentType:l.paymentType, qty:0, loadsCount:0 };
    groups[key].qty += Number(l.qty)||0;
    groups[key].loadsCount++;
  });
  return Object.values(groups).map(g=>{
    const planned = (job.materials||[]).find(m=>(m.material||'').trim().toLowerCase()===g.material.toLowerCase());
    const plannedQty = planned ? (Number(planned.qtyFinal!=null && planned.qtyFinal!=='' ? planned.qtyFinal : planned.qtyRequested)||0) : null;
    return { ...g, plannedQty, pct: plannedQty? Math.round(g.qty/plannedQty*100) : null };
  }).sort((a,b)=>a.material.localeCompare(b.material));
}
function completedSummaryHtml(job){
  const summary = completedMaterialSummaryForJob(job);
  if(!summary.length) return '';
  return summary.map(s=>{
    const pctStr = s.plannedQty? ` (${s.pct}% of ${s.plannedQty} planned)` : '';
    return `${s.material}: ${s.qty} ${unitLabel(s.paymentType)} across ${s.loadsCount} load${s.loadsCount===1?'':'s'}${pctStr}`;
  }).join('<br>');
}

function renderWeeklyTab(){
  if(!weeklyRange.start || !weeklyRange.end){
    weeklyRange = { start: addDays(currentWeekEnding,-6), end: currentWeekEnding };
  }
  const { start, end } = weeklyRange;
  const wkLoadsAll = state.loads.filter(l=> l.date && l.date>=start && l.date<=end);
  const nnl = wkLoadsAll.filter(l=>l.company==='NNL');
  const nfs = wkLoadsAll.filter(l=>l.company==='NFS');

  const nnlRev=sum(nnl,'revenue'), nnlPay=sum(nnl,'driverPay'), nnlNet=sum(nnl,'net');
  const nfsRev=sum(nfs,'revenue'), nfsPay=sum(nfs,'driverPay'), nfsNet=sum(nfs,'net');

  const nnlByBroker = groupBy(nnl,'party');
  const nfsByClient = groupBy(nfs,'party');
  const allDrivers = groupBy(wkLoadsAll,'driver');

  const totalInvoiced = nnlRev+nfsRev;
  const totalPayNet = nnlPay+nnlNet+nfsPay+nfsNet;
  const balanced = Math.abs(totalInvoiced-totalPayNet) < 0.01;
  const totalPayroll = sum(wkLoadsAll,'driverPay');
  const mismatchedLoads = wkLoadsAll.filter(l=>{
    const diff = (Number(l.driverPay)||0) + (Number(l.net)||0) - (Number(l.revenue)||0);
    return Math.abs(diff) > 0.01;
  });

  function groupTable(groupObj, revKey, payKey, netKey, nameLabel, company){
    const entries = Object.entries(groupObj);
    if(!entries.length) return `<div class="empty">No loads in this range yet.</div>`;
    return `<div class="tablewrap"><table><thead><tr><th>${nameLabel}</th><th># Loads</th><th>Revenue</th><th>Driver Pay</th><th>Net</th><th></th></tr></thead><tbody>
      ${entries.map(([name,items])=>`<tr><td><strong>${name}</strong></td><td class="num">${items.length}</td><td class="num">${fmtMoney(sum(items,'revenue'))}</td><td class="num">${fmtMoney(sum(items,'driverPay'))}</td><td class="num">${fmtMoney(sum(items,'net'))}</td><td><button class="btn btn-primary btn-sm" data-invoice="${company}|${encodeURIComponent(name)}|${start}|${end}">Print Invoice</button></td></tr>`).join('')}
    </tbody></table></div>`;
  }
function driverComplianceFlag(driverName){
  if(!driverName) return '';
  const match = state.compliance.find(r=>(r.name||'').trim().toLowerCase()===driverName.trim().toLowerCase());
  if(!match) return 'No Compliance Record';
  const s = complianceStatus(match);
  return s.label==='Complete' ? '' : s.label;
}
function driverNameCell(driverName){
  const flag = driverComplianceFlag(driverName);
  if(!flag) return `<strong>${driverName}</strong>`;
  return `<strong style="color:#C0362C;">⚠ ${driverName}</strong><div style="font-size:10.5px; color:#C0362C; font-weight:600;" title="${flag}">Missing/expired paperwork — hold pay</div>`;
}
function driverTable(groupObj){
    const entries = Object.entries(groupObj);
    if(!entries.length) return `<div class="empty">No loads in this range yet.</div>`;
    return `<div class="tablewrap"><table><thead><tr><th>Driver</th><th>Company</th><th># Loads</th><th>Amount Owed</th></tr></thead><tbody>
      ${entries.map(([name,items])=>{
        const companies = [...new Set(items.map(i=>i.company))].join(' + ');
        return `<tr><td>${driverNameCell(name)}</td><td>${companies}</td><td class="num">${items.length}</td><td class="num">${fmtMoney(sum(items,'driverPay'))}</td></tr>`;
      }).join('')}
      <tr class="grouprow"><td colspan="3">TOTAL PAYROLL FOR THIS RANGE</td><td class="num">${fmtMoney(totalPayroll)}</td></tr>
    </tbody></table></div>`;
  }

  return `
  <div class="pagehead">
    <h1>Weekly Invoice &amp; Payroll</h1>
    <p>Pick any date range to see exactly who to invoice and who to pay. Groups automatically, nothing to retype.</p>
  </div>

  <div class="weekpick">
    <button class="weekbtn" id="wk-prev">◀ Prev</button>
    <span style="font-size:12px; color:#5C7085;">From</span>
    <input type="date" id="wk-start" value="${start}">
    <span style="font-size:12px; color:#5C7085;">To</span>
    <input type="date" id="wk-end" value="${end}">
    <button class="weekbtn" id="wk-next">Next ▶</button>
  </div>

  <div class="sectiontitle">Nalu Nui Logistics — Invoice by Broker</div>
  <div class="card">${groupTable(nnlByBroker,'revenue','driverPay','net','Broker','NNL')}</div>

  <div class="sectiontitle">Nalu's Freight Solutions — Invoice by Client</div>
  <div class="card">${groupTable(nfsByClient,'revenue','driverPay','net','Client','NFS')}</div>

  <div class="sectiontitle">Driver Payroll — This Range</div>
  <div class="card">${driverTable(allDrivers)}</div>

  <div class="sectiontitle">Overall Check</div>
  <div class="card">
    <div class="formgrid" style="grid-template-columns:repeat(2,1fr); margin-bottom:0;">
      <div><div style="font-size:12px;color:#5C7085;">Total Invoiced (NNL + NFS)</div><div class="num" style="font-size:18px;font-weight:700;">${fmtMoney(totalInvoiced)}</div></div>
      <div><div style="font-size:12px;color:#5C7085;">Total Driver Pay + Company Net</div><div class="num" style="font-size:18px;font-weight:700;">${fmtMoney(totalPayNet)}</div></div>
    </div>
    <div class="balancebar ${balanced?'ok':'bad'}">
      <span>${balanced? 'Everything Balances ✓' : 'Mismatch — check load entries for this range'}</span>
      <span>${fmtMoney(totalInvoiced)}</span>
    </div>
    ${!balanced && mismatchedLoads.length ? `
    <div class="note" style="margin-top:14px; border-color:var(--bad-500,#C0362C);">
      ⚠ ${mismatchedLoads.length} load(s) below have Driver Pay + Net that don't add up to Revenue — that's the source of the mismatch, not a calculation bug elsewhere.
    </div>
    <div class="tablewrap" style="margin-top:10px;">
      <table>
        <thead><tr><th>Company</th><th>Date</th><th>${'Broker/Client'}</th><th>Ticket #</th><th>Revenue</th><th>Driver Pay</th><th>Net</th><th>Off By</th><th></th></tr></thead>
        <tbody>
          ${mismatchedLoads.map(l=>{
            const diff = (Number(l.driverPay)||0) + (Number(l.net)||0) - (Number(l.revenue)||0);
            return `<tr><td>${l.company}</td><td>${fmtDate(l.date)}</td><td>${l.party||l.broker||''}</td><td class="mono">${l.ticket||'—'}</td><td class="num">${fmtMoney(l.revenue)}</td><td class="num">${fmtMoney(l.driverPay)}</td><td class="num">${fmtMoney(l.net)}</td><td class="num" style="color:var(--bad-500,#C0362C); font-weight:700;">${fmtMoney(diff)}</td><td><button class="btn btn-ghost btn-sm" data-edit-mismatch="${l.company}|${l.id}">Edit</button></td></tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    ` : ''}
  </div>
  `;
}

let truckReportFilter = {
  NNL: { truck:'', start:'', end:'' },
  NFS: { truck:'', start:'', end:'' }
};
function distinctTrucks(company){
  const s = new Set();
  loadsFor(company).forEach(l=>{ if(l.truck) s.add(l.truck.trim()); });
  state.expenses.filter(e=>e.company===company).forEach(e=>{ if(e.truck) s.add(e.truck.trim()); });
  return [...s].sort((a,b)=>a.localeCompare(b));
}
function computeTruckReport(company, truck, start, end){
  const inRange = d => !!d && (!start || d>=start) && (!end || d<=end);
  const loads = loadsFor(company).filter(l=>l.truck===truck && inRange(l.date));
  const expenses = state.expenses.filter(e=>e.company===company && e.truck===truck && inRange(e.date));
  const income = sum(loads,'revenue');
  const driverPay = sum(loads,'driverPay');
  const gas = sum(expenses.filter(e=>e.category==='Diesel'),'amount');
  const additional = sum(expenses.filter(e=>e.category!=='Diesel'),'amount');
  const net = income - driverPay - gas - additional;
  return { loadCount:loads.length, income, driverPay, gas, additional, net };
}
function renderTruckReportCard(company){
  const f = truckReportFilter[company];
  const trucks = distinctTrucks(company);
  const hasSelection = f.truck && f.start && f.end;
  const r = hasSelection ? computeTruckReport(company, f.truck, f.start, f.end) : null;
  return `
  <div class="card">
    <h2>Per-Truck Report <span class="tag">Pick a truck and a date range</span></h2>

      <div class="field"><label>To</label><input type="date" id="tr-end-${company}" value="${f.end}"></div>
    </div>

      !hasSelection ? `<div class="empty">Pick a truck and both dates to see its numbers for that range.</div>` : `
    <div class="statgrid">

    </div>
