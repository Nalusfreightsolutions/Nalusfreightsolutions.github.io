<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarelys Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/app.css">
<style>
  body{background:var(--navy-950); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
  .picker{max-width:720px; width:100%; text-align:center;}
  .picker h1{color:var(--white); font-size:32px; margin:0 0 6px;}
  .picker .sub{color:var(--steel-400); font-size:13px; text-transform:uppercase; letter-spacing:.08em; margin-bottom:36px;}
  .apps{display:grid; grid-template-columns:1fr 1fr; gap:20px;}
  @media(max-width:600px){ .apps{grid-template-columns:1fr;} }
  .appcard{
    display:block; background:var(--navy-900); border:1.5px solid var(--navy-700); border-radius:14px;
    padding:34px 26px; text-decoration:none; transition:border-color .15s, transform .15s;
  }
  .appcard:hover{border-color:var(--amber-500); transform:translateY(-2px);}
  .appcard .name{font-family:'Oswald'; font-size:21px; font-weight:700; color:var(--white); text-transform:uppercase; letter-spacing:.03em;}
  .appcard .desc{font-size:13px; color:var(--steel-400); margin-top:10px; line-height:1.6;}
  .appcard .go{display:inline-block; margin-top:18px; background:var(--amber-500); color:var(--navy-950); font-weight:700; font-size:13px; padding:9px 22px; border-radius:6px;}
</style>
</head>
<body>
<div class="picker">
  <h1>Jarelys</h1>
  <div class="sub">Command Center</div>
  <div class="apps">
    <a class="appcard" href="/nnl/">
      <div class="name">Nalu Nui Logistics</div>
      <div class="desc">Trucking — loads, driver compliance, expenses &amp; maintenance, invoices, payroll, financials.</div>
      <span class="go">Open NNL →</span>
    </a>
    <a class="appcard" href="/nfs/">
      <div class="name">Nalu's Freight Solutions</div>
      <div class="desc">Materials &amp; sales — quotes, landed jobs, pits &amp; contacts, client invoicing, payroll, financials.</div>
      <span class="go">Open NFS →</span>
    </a>
  </div>
</div>
</body>
</html>
