};
function taxCategoryFor(name){ return EXPENSE_TAX_CATEGORY[name] || ANNUAL_TAX_CATEGORY[name] || 'Other Expenses (Line 27)'; }

function quarterOf(dateStr){ return Math.ceil(Number(dateStr.slice(5,7))/3); }
function getReportLoads(company){ return company==='All' ? state.loads : state.loads.filter(l=>l.company===company); }
function getReportExpenses(company){ return company==='All' ? state.expenses : state.expenses.filter(e=>e.company===company); }
function reportCompanies(company){ return company==='All' ? ['NNL','NFS'] : [company]; }

function getAvailableYears(){
  const years = new Set([String(reportsFilterNNL.year), String(reportsFilterNFS.year)]);
  state.loads.forEach(l=>{ if(l.date) years.add(l.date.slice(0,4)); });
  state.expenses.forEach(e=>{ if(e.date) years.add(e.date.slice(0,4)); });
  return [...years].sort();
}

function computeQuarterly(company, year){
  const loads = getReportLoads(company).filter(l=>l.date && l.date.slice(0,4)===String(year));
  const expenses = getReportExpenses(company).filter(e=>e.date && e.date.slice(0,4)===String(year));
  return [1,2,3,4].map(q=>{
    const qLoads = loads.filter(l=>quarterOf(l.date)===q);
    const qExp = expenses.filter(e=>quarterOf(e.date)===q);
    const revenue = sum(qLoads,'revenue'), driverPay = sum(qLoads,'driverPay'), opex = sum(qExp,'amount');
    return { q, revenue, driverPay, opex, net: revenue-driverPay-opex, loadCount:qLoads.length };
  });
}

function computeCategoryBreakdown(company, year){
  const map = {};
  getReportExpenses(company).filter(e=>e.date && e.date.slice(0,4)===String(year)).forEach(e=>{
    const cat = e.category||'Other';
    map[cat] = (map[cat]||0) + (Number(e.amount)||0);
  });
  const undated = [];
  reportCompanies(company).forEach(c=>{
    state.annual[c].forEach(a=>{
      const amt = Number(a.amount)||0;
      if(!amt) return;
      if(a.due && a.due.slice(0,4)===String(year)) map[a.item] = (map[a.item]||0) + amt;
      else if(!a.due) undated.push(a);
    });
  });
  return { map, undated };
}

function drawChart(canvasId, config){
  const canvas = document.getElementById(canvasId);
  if(!canvas || typeof Chart==='undefined') return;
  if(reportChartInstances[canvasId]){ reportChartInstances[canvasId].destroy(); }
  reportChartInstances[canvasId] = new Chart(canvas.getContext('2d'), config);
}

const FOLDER_SUPPORTED = 'showDirectoryPicker' in window;

async function connectExportFolder(){
  if(!FOLDER_SUPPORTED){
    alert("Your browser doesn't support connecting a folder (this needs Chrome or Edge on a computer). Exports will download normally instead.");
    return;
  }
  try{
    exportDirHandle = await window.showDirectoryPicker();
    document.getElementById('folder-status').textContent = '📁 Connected — exports save straight to your folder (until you close this tab)';
    document.getElementById('folder-status').style.color = 'var(--good-500)';
  }catch(e){ /* user cancelled the picker */ }
}
async function writeBlobToFolderOrDownload(blob, filename){
  if(exportDirHandle){
    try{
      const fileHandle = await exportDirHandle.getFileHandle(filename, {create:true});
      const writable = await fileHandle.createWritable();
      await writable.write(blob);
      await writable.close();
      return true;
    }catch(e){
      alert('Could not save to the connected folder, downloading instead. ('+e.message+')');
    }
  }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
  return false;
}
async function writeWorkbook(wb, filename){
  const buf = XLSX.write(wb, {bookType:'xlsx', type:'array'});
  const blob = new Blob([buf], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  return writeBlobToFolderOrDownload(blob, filename);
}

    };
    if(isNNL){ base['Pit']=l.pit||''; base['Customer']=l.customer||''; base['Job Name']=l.jobName||''; }
    if(!isNNL){ base['Broker']=l.broker||''; base['Job Name']=l.jobName||''; base['Job Source']=l.jobSource||''; base['Driver Type']=l.driverType||''; }
    Object.assign(base, {
      'Truck #': l.truck||'', Driver: l.driver||'', 'Payment Type': l.paymentType||'',
      Quantity: Number(l.qty)||0, 'Rate ($)': Number(l.rate)||0,
      'Job Revenue': Number(l.revenue)||0, 'Driver Pay': Number(l.driverPay)||0, 'Company Net': Number(l.net)||0,
      'Payment Status': l.status||'', 'Invoice #': l.invoiceNum||'', 'Date Paid': l.datePaid||'', Notes: l.notes||''
    });
    return base;
  });
}

/* ============================= INVOICE GENERATION ============================= */
function addDays(dateStr, n){ const d = new Date(dateStr+'T00:00:00'); if(isNaN(d)) return ''; d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }

function unitLabel(paymentType){
  return {'Per Ton':'ton(s)','Per Yard':'yard(s)','Per Load':'load(s)','Per Hour':'hour(s)'}[paymentType] || 'unit(s)';
}

function buildInvoiceHTML(company, party, opts){
  const items = invoiceItemsFor(company, party, opts).slice().sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  if(!items.length) return null;

  let invNum = items[0].invoiceNum;
  if(!invNum){
    state.invoiceCounter[company] = (state.invoiceCounter[company]||1000) + 1;
    invNum = company+'-'+state.invoiceCounter[company];
    items.forEach(l=>{ l.invoiceNum = invNum; if(l.status==='Pending') l.status='Invoiced'; });
    persist();
  }

  const biz = BUSINESS_INFO[company];
  const rangeStart = opts.startDate || items[0].date;
  const rangeEnd = opts.endDate || items[items.length-1].date;
  const dueDate = addDays(rangeEnd, 7);
  const total = sum(items,'revenue');

  const jobGroups = {};
  items.forEach(l=>{
    const jn = l.jobName || '—';
    (jobGroups[jn] = jobGroups[jn] || []).push(l);
  });
  const rows = Object.entries(jobGroups).map(([jobName, group])=>{
    const customer = l => (company==='NNL' ? (l.customer||'') : (l.party||'')) || '—';
    const ticketRows = group.map(l=>`
    <tr>
      <td>${fmtDate(l.date)}</td>
      <td class="num">${l.ticket||'—'}</td>
      <td>${customer(l)}</td>
      <td>${jobName}</td>
      <td class="num">${fmtQty(l.qty)} ${unitLabel(l.paymentType)}</td>
      <td class="num">${fmtMoney(l.rate)}</td>
      <td class="num">${fmtMoney(l.revenue)}</td>
    </tr>`).join('');
    const qty = sum(group,'qty');
    const revenue = sum(group,'revenue');
    const unit = unitLabel(group[0].paymentType);
    const totalRow = `
    <tr class="grouprow">
      <td colspan="4">Total for ${jobName}</td>
      <td class="num">${fmtQty(qty)} ${unit}</td>
      <td></td>
      <td class="num">${fmtMoney(revenue)}</td>
    </tr>`;
    return ticketRows + totalRow;
  }).join('');

  const html = `
    <div class="inv-head">
      <div>
        <div class="inv-brand">${biz.name}</div>
        <div class="inv-sub">${biz.sub? biz.sub+'<br>' : ''}${biz.phone}</div>
      </div>
      <div>
        <div class="inv-title">INVOICE</div>
        <div class="inv-meta">
          Invoice #: <strong>${invNum}</strong><br>
          Date Issued: <strong>${fmtDate(rangeEnd)}</strong><br>
          Payment Due: <strong>${fmtDate(dueDate)}</strong>
        </div>
      </div>
    </div>
    <div class="inv-billto">
      <div class="lbl">Bill To</div>
      <div class="name">${party}</div>
    </div>
    <div style="font-size:12px;color:#5C7085;margin-bottom:14px;">${fmtDate(rangeStart)} – ${fmtDate(rangeEnd)}</div>
    <table>
      <thead><tr><th>Date</th><th>Ticket #</th><th>Customer</th><th>Job Name</th><th>Qty</th><th>Rate</th><th>Amount</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="inv-totals">
      <table>
        <tr class="grand"><td>Total Due</td><td class="num">${fmtMoney(total)}</td></tr>
      </table>
    </div>`;
  return { html, invNum, total, dueDate, rangeStart, rangeEnd };
}

function weekRange(week){ return { startDate: addDays(week,-6), endDate: week }; }
function invoiceItemsFor(company, party, opts){
  if(opts.invoiceNum) return state.loads.filter(l=>l.invoiceNum===opts.invoiceNum);
  return state.loads.filter(l=>l.company===company && l.party===party && l.date>=opts.startDate && l.date<=opts.endDate);
}

function invoiceTextFor(company, party, opts){
  const items = invoiceItemsFor(company, party, opts).slice().sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  if(!items.length) return null;
  const biz = BUSINESS_INFO[company];
  const rangeStart = opts.startDate || items[0].date;
  const rangeEnd = opts.endDate || items[items.length-1].date;
  const dueDate = addDays(rangeEnd,7);
  const invNum = items[0].invoiceNum || '(not yet generated — click Print first)';
  const jobGroups = {};
  items.forEach(l=>{
    const jn = l.jobName || '—';
    (jobGroups[jn] = jobGroups[jn] || []).push(l);
  });
  const lines = Object.entries(jobGroups).flatMap(([jobName, group])=>{
    const ticketLines = group.map(l=>{
      const customer = (company==='NNL' ? (l.customer||'') : (l.party||'')) || '—';
      return `${fmtDate(l.date)}  |  Ticket ${l.ticket||'—'}  |  ${customer} · ${jobName}  |  ${fmtQty(l.qty)} ${unitLabel(l.paymentType)} @ ${fmtMoney(l.rate)}  =  ${fmtMoney(l.revenue)}`;
    });
    const qty = sum(group,'qty');
    const revenue = sum(group,'revenue');
    const unit = unitLabel(group[0].paymentType);
    return [...ticketLines, `Total for ${jobName}: ${fmtQty(qty)} ${unit}  =  ${fmtMoney(revenue)}`, ''];
  });
  const total = sum(items,'revenue');
  return [
    `${biz.name}`, ...(biz.sub? [biz.sub] : []), `${biz.phone}`, '',
    `INVOICE #${invNum}`, `Date Issued: ${fmtDate(rangeEnd)}`, `Payment Due: ${fmtDate(dueDate)}`, '',
    `Bill To: ${party}`, `${fmtDate(rangeStart)} – ${fmtDate(rangeEnd)}`, '',
    ...lines,
    `TOTAL DUE: ${fmtMoney(total)}`
  ].join('\n');
}

function printAllForWeek(week){
  const combos = [...new Set(state.loads.filter(l=>weekEndingFriday(l.date)===week).map(l=>l.company+'|'+l.party))];
  if(!combos.length){ alert('No loads found for that week.'); return; }
  const range = weekRange(week);
  const pages = combos.map(c=>{
    const [company, party] = c.split('|');
    const built = buildInvoiceHTML(company, party, range);
    return built ? `<div class="invoice-page">${built.html}</div>` : '';
  }).join('');
  document.getElementById('invoice-modal').innerHTML = `
    ${pages}
    <div class="modal-actions no-print">
      <button class="btn btn-ghost" id="inv-close">Close</button>
      <button class="btn btn-primary" id="inv-print">Print / Save All as PDF</button>
    </div>`;

}

function copyInvoiceText(company, party, opts){
  if(!opts) opts = weekRange(currentWeekEnding);
  else if(typeof opts === 'string') opts = weekRange(opts);
  const text = invoiceTextFor(company, party, opts);
  if(!text){ alert('No loads found for '+party+' in that range.'); return; }
  navigator.clipboard.writeText(text).then(()=>{
    alert('Invoice copied — paste it into your email.');
  }).catch(()=>{
    alert('Could not copy automatically. Here is the invoice text:\n\n'+text);
  });
}

function getAllInvoices(){
  const map = {};
  state.loads.forEach(l=>{
    if(!l.invoiceNum) return;
    if(!map[l.invoiceNum]) map[l.invoiceNum] = {invoiceNum:l.invoiceNum, company:l.company, party:l.party, items:[]};
    map[l.invoiceNum].items.push(l);
  });
  return Object.values(map).map(inv=>{
    const week = weekEndingFriday(inv.items[0].date);
    const statuses = inv.items.map(i=>i.status);
    const status = statuses.every(s=>s==='Paid') ? 'Paid' : statuses.some(s=>s==='Paid') ? 'Partially Paid' : 'Invoiced';
    return { ...inv, week, total: sum(inv.items,'revenue'), status };
  }).sort((a,b)=> b.week.localeCompare(a.week));
}

function attachLoadsTableHandlers(company){
  const card = document.getElementById('loads-table-card-'+company);
  if(!card) return;
  const search = document.getElementById('loads-search-'+company);
  if(search) search.oninput = ()=>{ loadsFilterText[company]=search.value; refreshLoadsTable(company); };
  const tableRegion = document.getElementById('loads-table-only-'+company);
  if(!tableRegion) return;
  tableRegion.querySelectorAll('[data-sort]').forEach(th=>{
    th.onclick = ()=>{
      const key = th.dataset.sort;
      const cfg = loadsSortConfig[company];
      if(cfg.key===key) cfg.dir = cfg.dir==='asc'?'desc':'asc'; else { cfg.key=key; cfg.dir='asc'; }
      refreshLoadsTable(company);
    };
  });
  tableRegion.querySelectorAll('[data-edit-load]').forEach(b=>b.onclick=()=>{ editingLoadId=b.dataset.editLoad; render(); window.scrollTo(0,0); });
  tableRegion.querySelectorAll('[data-del-load]').forEach(b=>b.onclick=()=>{
    showConfirm('Delete this load? This cannot be undone.', ()=>{
      state.loads = state.loads.filter(l=>l.id!==b.dataset.delLoad);
      selectedLoads[company].delete(b.dataset.delLoad);
      persist(); refreshLoadsTable(company);
    });
  });

  // Row selection
  tableRegion.querySelectorAll('[data-sel-load]').forEach(cb=>cb.onchange=()=>{
    if(cb.checked) selectedLoads[company].add(cb.dataset.selLoad);
    else selectedLoads[company].delete(cb.dataset.selLoad);
    refreshLoadsTable(company);
  });
  const selAll = document.getElementById('sel-all-'+company);
  if(selAll) selAll.onchange = ()=>{
    const visible = filteredLoads(company);
    if(selAll.checked) visible.forEach(l=>selectedLoads[company].add(l.id));
    else visible.forEach(l=>selectedLoads[company].delete(l.id));
    refreshLoadsTable(company);
  };

  // Filter bar
  const fbar = document.getElementById('loads-filterbar-'+company);
  if(fbar){
    fbar.querySelectorAll('[data-lfilter]').forEach(el=>el.onchange=()=>{
      loadsFilters[company][el.dataset.lfilter] = el.value;
      refreshFilterBar(company); refreshLoadsTable(company);
    });
    const clearBtn = fbar.querySelector('[data-clear-lfilters]');
    if(clearBtn) clearBtn.onclick = ()=>{
      loadsFilters[company] = mkDefaultLoadFilters();
      refreshFilterBar(company); refreshLoadsTable(company);
    };
  }

  attachBulkBarHandlers(company);
}

  return state.loads.filter(l=>selectedLoads[company].has(l.id));
}
function refreshFilterBar(company){
  const bar = document.getElementById('loads-filterbar-'+company);

function filteredLoads(company){
  const filterText = (loadsFilterText[company]||'').toLowerCase();
  const f = loadsFilters[company];
  let rows = loadsFor(company);
  if(filterText){
    rows = rows.filter(l => [l.party,l.driver,l.truck,l.notes,l.paymentType,l.status,l.invoiceNum,l.ticket,l.broker,l.customer,l.jobName]
      .some(v => (v||'').toString().toLowerCase().includes(filterText)));
  }
  if(f.status!=='All') rows = rows.filter(l => (l.status||'')===f.status);
  if(f.driver!=='All') rows = rows.filter(l => (l.driver||'')===f.driver);
  if(f.truck!=='All') rows = rows.filter(l => (l.truck||'').toString()===f.truck);
  if(f.party!=='All') rows = rows.filter(l => (l.party||'')===f.party);
  if(f.jobName!=='All') rows = rows.filter(l => (l.jobName||'')===f.jobName);
  if(f.datePaid==='missing') rows = rows.filter(l => !l.datePaid);
  else if(f.datePaid==='has') rows = rows.filter(l => !!l.datePaid);
  if(f.dateFrom) rows = rows.filter(l => (l.date||'') >= f.dateFrom);
  if(f.dateTo) rows = rows.filter(l => (l.date||'') <= f.dateTo);
  return rows;
}
function anyLoadsFilterActive(company){
  const f = loadsFilters[company];
  return !!(loadsFilterText[company] || f.dateFrom || f.dateTo ||
    ['status','driver','truck','party','jobName','datePaid'].some(k=>f[k]!=='All'));
}
function refreshLoadsTable(company){
  const tableRegion = document.getElementById('loads-table-only-'+company);
  if(!tableRegion) return;
  tableRegion.innerHTML = loadsTableInner(company);
  const countEl = document.getElementById('loads-count-'+company);
  if(countEl){
    const shown = filteredLoads(company).length, total = loadsFor(company).length;
    countEl.innerHTML = `All Loads <span class="tag">${anyLoadsFilterActive(company)? shown+' of '+total+' shown' : total+' total'}</span>`;
  }
  refreshBulkBar(company);
  attachLoadsTableHandlers(company);
}

/* ============================= EXCEL IMPORT ============================= */
function normHeader(h){ return String(h||'').toLowerCase().replace(/[^a-z0-9]/g,''); }
const IMPORT_ALIASES = {
  date:['date'], party:['broker','client','party'],
  ticket:['ticket','ticketnum','ticketno','ticket#'],
  pit:['pit'], customer:['customer'], jobName:['jobname','job'],
  broker:['broker'],
  truck:['truck','truckno','truckno'], driver:['driver','hauler'],
  paymentType:['paymenttype','type'], qty:['quantity','qty','tons','yards'],
  rate:['rate','price','priceperunit'], driverPay:['driverpay','chofer30','driverpay30'],
  status:['paymentstatus','status'], invoiceNum:['invoice','invoicenum','invoiceno'],
  datePaid:['datepaid'], notes:['notes'], jobSource:['jobsource','source'],
  referredBy:['referredby'], driverType:['drivertype']
};
function dateToISO(v){
  if(!v) return '';
  if(v instanceof Date) return v.toISOString().slice(0,10);
  const s = String(v).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m) return `${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
  return '';
}
function mapRowToLoad(row, company){
  const norm = {};
  Object.keys(row).forEach(k=>{ norm[normHeader(k)] = row[k]; });
  const pick = aliases => { for(const a of aliases){ if(norm[a]!==undefined && norm[a]!=='') return norm[a]; } return ''; };
  const paymentTypeRaw = String(pick(IMPORT_ALIASES.paymentType)).toLowerCase();
  let paymentType = 'Per Ton';
  if(paymentTypeRaw.includes('yard')) paymentType='Per Yard';
  else if(paymentTypeRaw.includes('load')) paymentType='Per Load';
  else if(paymentTypeRaw.includes('hour')) paymentType='Per Hour';
  else if(paymentTypeRaw.includes('ton')) paymentType='Per Ton';
  const statusRaw = String(pick(IMPORT_ALIASES.status));
  const status = ['Pending','Invoiced','Paid'].find(s=>s.toLowerCase()===statusRaw.toLowerCase()) || 'Pending';
  return {
    date: dateToISO(pick(IMPORT_ALIASES.date)),
    party: String(pick(IMPORT_ALIASES.party)).trim(),
    ticket: String(pick(IMPORT_ALIASES.ticket)).trim(),
    pit: String(pick(IMPORT_ALIASES.pit)).trim(),
    customer: String(pick(IMPORT_ALIASES.customer)).trim(),
    jobName: String(pick(IMPORT_ALIASES.jobName)).trim(),
    broker: String(pick(IMPORT_ALIASES.broker)).trim(),
    truck: String(pick(IMPORT_ALIASES.truck)).trim(),
    driver: String(pick(IMPORT_ALIASES.driver)).trim(),
    paymentType, qty: pick(IMPORT_ALIASES.qty), rate: pick(IMPORT_ALIASES.rate),
    driverPay: pick(IMPORT_ALIASES.driverPay),
    status, invoiceNum: String(pick(IMPORT_ALIASES.invoiceNum)).trim(),
    datePaid: dateToISO(pick(IMPORT_ALIASES.datePaid)),
    notes: String(pick(IMPORT_ALIASES.notes)).trim(),
    jobSource: String(pick(IMPORT_ALIASES.jobSource)).trim() || 'Direct',
    driverType: String(pick(IMPORT_ALIASES.driverType)).trim() || 'Company Driver',
  };
}
async function handleImportFile(company, file){
  if(!file) return;
  let json;
  try{
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, {type:'array', cellDates:true});
    const sheet = wb.Sheets[wb.SheetNames[0]];
    json = XLSX.utils.sheet_to_json(sheet, {defval:''});
  }catch(e){ alert('Could not read that file. Make sure it is a .xlsx file.'); return; }
  if(!json.length){ alert('No rows found in that file.'); return; }
  let imported=0, skipped=0;
  json.forEach(row=>{
    const l = mapRowToLoad(row, company);
    if(!l.date || !l.party){ skipped++; return; }
    l.id = uid(); l.company = company;
    // Spreadsheets may have a flat driver-pay column (old convention) — convert
    // to an equivalent per-unit driverRate so computeLoadFinancials doesn't zero it out.
    if(l.driverPay && Number(l.qty)>0 && !l.driverRate){
      l.driverRate = (Number(l.driverPay)/Number(l.qty)).toFixed(2);
    }
    computeLoadFinancials(l);
    state.loads.push(l);
    imported++;
  });
  persist(); render();
  alert(`Imported ${imported} load(s).${skipped? ' Skipped '+skipped+' row(s) missing a date or '+(company==='NNL'?'broker':'client')+' name.':''}`);
}

  if(qtReportPrint) qtReportPrint.onclick = ()=>{
    const rows = state.quotes.slice().filter(q=>(q.date||'').slice(0,7)===quoteReportMonth).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    const [y,m] = quoteReportMonth.split('-');
    const monthLabel = new Date(Number(y), Number(m)-1, 1).toLocaleString('en-US',{month:'long', year:'numeric'});
    openQuoteListPrint(rows, 'MONTHLY QUOTE REPORT', monthLabel);
  };

  const sjAddMaterial = document.getElementById('sj-add-material');
  if(sjAddMaterial) sjAddMaterial.onclick = ()=>{
    syncMaterialDraftFromDOM(salesJobMaterialDraft, 'sj');
    salesJobMaterialDraft.push(mkEmptyMaterialLine());
    render();
  };
  const sjSave = document.getElementById('sj-save');
  if(sjSave) sjSave.onclick = ()=>{
    syncMaterialDraftFromDOM(salesJobMaterialDraft, 'sj');
    const get = id => document.getElementById(id)?.value;
    const client = (get('sj-client')||'').trim();
    if(!client){ alert('Enter a client name first.'); return; }
    let j = editingSalesJobId ? state.salesJobs.find(x=>x.id===editingSalesJobId) : {id:uid()};
    j.client=client; j.jobName=get('sj-jobname'); j.jobAddress=get('sj-jobaddress');
    // Falls back to today if left blank so this job isn't silently excluded from the
    // year-filtered Financial Reports tab, which filters landed jobs by jobStarted.
    j.jobStarted=get('sj-jobstarted') || new Date().toISOString().slice(0,10); j.jobEnded=get('sj-jobended');
    j.salesRep=get('sj-salesrep'); j.notes=get('sj-notes');
    const sjIncompleteRows = salesJobMaterialDraft.filter(m=>!m.material && (m.price || m.qtyRequested || m.qtyFinal || m.truckingCost));
    if(sjIncompleteRows.length && !confirm(`${sjIncompleteRows.length} material line(s) have pricing/qty entered but no Material selected from the dropdown, so they will NOT be saved. Continue anyway?`)) return;
    j.materials = salesJobMaterialDraft.filter(m=>m.material).map(m=>({...m}));
    if(!editingSalesJobId) state.salesJobs.push(j);
    editingSalesJobId = null; salesJobMaterialDraft = []; salesJobFormDraft = mkEmptySalesJobFormDraft();
    persist(); render();
  };
  const sjCancel = document.getElementById('sj-cancel');
  if(sjCancel) sjCancel.onclick = ()=>{ editingSalesJobId=null; salesJobMaterialDraft=[]; salesJobFormDraft=mkEmptySalesJobFormDraft(); render(); };
  document.querySelectorAll('[data-edit-salesjob]').forEach(b=>b.onclick=()=>{ startEditSalesJob(b.dataset.editSalesjob); render(); window.scrollTo(0,0); });
  document.querySelectorAll('[data-del-salesjob]').forEach(b=>b.onclick=()=>{
    showConfirm('Delete this landed job? This cannot be undone.', ()=>{
      state.salesJobs = state.salesJobs.filter(j=>j.id!==b.dataset.delSalesjob);
      persist(); render();
    });
  });

  // Loads
  const saveBtn = document.getElementById('lf-save');
  if(saveBtn) saveBtn.onclick = ()=>{
    const company = currentLoadCompany;
    const get = id => document.getElementById(id)?.value;
    let l = editingLoadId ? state.loads.find(x=>x.id===editingLoadId) : {id:uid(), company};
    l.date = get('lf-date'); l.party = get('lf-party'); l.ticket = get('lf-ticket'); l.truck = get('lf-truck'); l.driver = get('lf-driver');
    l.paymentType = get('lf-paymenttype'); l.qty = get('lf-qty'); l.rate = get('lf-rate');
    l.status = get('lf-status'); l.invoiceNum = get('lf-invoicenum'); l.datePaid = get('lf-datepaid'); l.notes = get('lf-notes');
    if(company==='NNL'){
      l.pit = get('lf-pit'); l.customer = get('lf-customer'); l.jobName = get('lf-jobname');
      l.driverType = get('lf-drivertype'); l.driverRate = get('lf-driverrate');
    }
    if(company==='NFS'){
      l.broker = get('lf-broker'); l.jobName = get('lf-jobname'); l.material = get('lf-material'); l.jobSource = get('lf-jobsource'); l.driverType = get('lf-drivertype');
      l.driverRate = get('lf-driverrate');
    }
    const finishSave = ()=>{
      computeLoadFinancials(l);
      if(!editingLoadId) state.loads.push(l);
      editingLoadId = null;
      persist(); render();
    };
    const dup = findDuplicateTicket(company, l.ticket, l.id);
    if(dup){
      showConfirm(`Ticket #${l.ticket} is already used by a load on ${fmtDate(dup.date)} for ${dup.party||dup.broker||'—'}. Save this one anyway?`, finishSave);
    } else {
      finishSave();
    }
  };
  const cancelBtn = document.getElementById('lf-cancel');
  if(cancelBtn) cancelBtn.onclick = ()=>{ editingLoadId=null; render(); };
  attachLoadsTableHandlers(currentLoadCompany);
  attachJobSharedHandlers(currentLoadCompany);

  // Import from Excel
  const importBtn = document.getElementById('import-loads-'+currentLoadCompany);
  const importFile = document.getElementById('import-file-'+currentLoadCompany);
  if(importBtn && importFile){
    importBtn.onclick = ()=> importFile.click();
    importFile.onchange = ()=>{ handleImportFile(currentLoadCompany, importFile.files[0]); importFile.value=''; };
  }

  // Check for Duplicate Tickets
  const checkDupBtn = document.getElementById('check-dup-tickets-'+currentLoadCompany);
  if(checkDupBtn) checkDupBtn.onclick = ()=>{
    dupTicketCheck[currentLoadCompany] = findAllDuplicateTickets(currentLoadCompany);
    render();
  };
  const dupPanel = document.getElementById('dup-ticket-panel-'+currentLoadCompany);
  if(dupPanel){
    dupPanel.querySelectorAll('[data-edit-load]').forEach(b=>b.onclick=()=>{ editingLoadId=b.dataset.editLoad; render(); window.scrollTo(0,0); });
  }

  // Expenses
  const esave = document.getElementById('ef-save');
  if(esave) esave.onclick = ()=>{
    const get = id => document.getElementById(id)?.value;
    let e = editingExpenseId ? state.expenses.find(x=>x.id===editingExpenseId) : {id:uid()};
    e.company=get('ef-company'); e.date=get('ef-date'); e.category=get('ef-category'); e.truck=get('ef-truck');
    e.amount=get('ef-amount'); e.frequency=get('ef-frequency'); e.notes=get('ef-notes');
    if(!editingExpenseId) state.expenses.push(e);
    editingExpenseId=null; persist(); render();
  };
  const ecancel = document.getElementById('ef-cancel');
  if(ecancel) ecancel.onclick = ()=>{ editingExpenseId=null; render(); };
  document.querySelectorAll('[data-edit-exp]').forEach(b=>b.onclick=()=>{ editingExpenseId=b.dataset.editExp; render(); window.scrollTo(0,0); });
  document.querySelectorAll('[data-del-exp]').forEach(b=>b.onclick=()=>{
    showConfirm('Delete this expense?', ()=>{
      state.expenses = state.expenses.filter(e=>e.id!==b.dataset.delExp);
      persist(); render();
    });
  });
  const tmFilter = document.getElementById('tm-truck-filter');
  if(tmFilter) tmFilter.onchange = ()=>{ truckMaintenanceFilter = tmFilter.value; render(); };

  // Weekly nav
  const wkStart = document.getElementById('wk-start');
  if(wkStart) wkStart.onchange = ()=>{ weeklyRange.start = wkStart.value; render(); };
  const wkEnd = document.getElementById('wk-end');
  if(wkEnd) wkEnd.onchange = ()=>{ weeklyRange.end = wkEnd.value; render(); };
  const wkPrev = document.getElementById('wk-prev');
  if(wkPrev) wkPrev.onclick = ()=>{ weeklyRange.start = addDays(weeklyRange.start,-7); weeklyRange.end = addDays(weeklyRange.end,-7); render(); };
  const wkNext = document.getElementById('wk-next');
  if(wkNext) wkNext.onclick = ()=>{ weeklyRange.start = addDays(weeklyRange.start,7); weeklyRange.end = addDays(weeklyRange.end,7); render(); };
  document.querySelectorAll('[data-edit-mismatch]').forEach(b=>b.onclick=()=>{
    const [company, loadId] = b.dataset.editMismatch.split('|');
    currentLoadCompany = company;
    editingLoadId = loadId;
    activeTab = company==='NNL' ? 'nnl' : 'nfs';
    render();
    window.scrollTo(0,0);
  });

  // Annual
  document.querySelectorAll('.annual-item,.annual-amount,.annual-due,.annual-status').forEach(inp=>{
    inp.onchange = ()=>{
      const {company,id} = inp.dataset;
      const item = state.annual[company].find(x=>x.id===id);
      if(!item) return;
      if(inp.classList.contains('annual-item')) item.item = inp.value;
      if(inp.classList.contains('annual-amount')) item.amount = inp.value;
      if(inp.classList.contains('annual-due')) item.due = inp.value;
      if(inp.classList.contains('annual-status')) item.status = inp.value;
      persist();
      render();
    };
  });
  document.querySelectorAll('[data-add-annual]').forEach(b=>b.onclick=()=>{
    const company = b.dataset.addAnnual;
    state.annual[company].push({id:uid(), item:'New Item', amount:0, due:'', status:'Unpaid'});
    persist(); render();
  });
  document.querySelectorAll('[data-del-annual]').forEach(b=>b.onclick=()=>{
    const [company,id] = b.dataset.delAnnual.split('|');
    state.annual[company] = state.annual[company].filter(x=>x.id!==id);
    persist(); render();
  });
  const yearInp = document.getElementById('annual-year');
  if(yearInp) yearInp.onchange = ()=>{ window.__annualYear = Number(yearInp.value); render(); };
  const gotoReports = document.getElementById('goto-reports-btn');
  if(gotoReports) gotoReports.onclick = ()=>{ activeTab='reports-nnl'; render(); };

  // Financial Reports — NNL
  const rpYearNNL = document.getElementById('rp-year-NNL');
  if(rpYearNNL) rpYearNNL.onchange = ()=>{ reportsFilterNNL.year = Number(rpYearNNL.value); render(); };
  const rpViewQNNL = document.getElementById('rp-view-quarterly-NNL');
  if(rpViewQNNL) rpViewQNNL.onclick = ()=>{ reportsFilterNNL.view='quarterly'; render(); };
  const rpViewANNL = document.getElementById('rp-view-annual-NNL');
  if(rpViewANNL) rpViewANNL.onclick = ()=>{ reportsFilterNNL.view='annual'; render(); };

  // Financial Reports — NFS
  const rpYearNFS = document.getElementById('rp-year-NFS');
  if(rpYearNFS) rpYearNFS.onchange = ()=>{ reportsFilterNFS.year = Number(rpYearNFS.value); render(); };
  const rpViewQNFS = document.getElementById('rp-view-quarterly-NFS');
  if(rpViewQNFS) rpViewQNFS.onclick = ()=>{ reportsFilterNFS.view='quarterly'; render(); };
  const rpViewANFS = document.getElementById('rp-view-annual-NFS');
  if(rpViewANFS) rpViewANFS.onclick = ()=>{ reportsFilterNFS.view='annual'; render(); };

  // Per-Truck Report — NNL & NFS
  ['NNL','NFS'].forEach(company=>{
    const truckSel = document.getElementById('tr-truck-'+company);
    if(truckSel) truckSel.onchange = ()=>{ truckReportFilter[company].truck = truckSel.value; render(); };
    const startInp = document.getElementById('tr-start-'+company);
    if(startInp) startInp.onchange = ()=>{ truckReportFilter[company].start = startInp.value; render(); };
    const endInp = document.getElementById('tr-end-'+company);
    if(endInp) endInp.onchange = ()=>{ truckReportFilter[company].end = endInp.value; render(); };
  });

  if(activeTab==='reports-nnl') drawReportsCharts('NNL');
  if(activeTab==='reports-nfs') drawReportsCharts('NFS');
  if(activeTab==='salesteam' && salesTeamSubtab==='pitmap') initPitMapLeaflet();

  // Pit Map & Routing tab
  const pmLocateMissing = document.getElementById('pm-locate-missing');
  if(pmLocateMissing) pmLocateMissing.onclick = geocodeAllMissingPits;
  const pmSaveKey = document.getElementById('pm-save-key');
  if(pmSaveKey) pmSaveKey.onclick = ()=>{
    const key = (document.getElementById('pm-key-input')?.value||'').trim();
    if(!key){ alert('Paste your OpenRouteService API key first.'); return; }
    state.orsApiKey = key; persist(); render();
  };
  const pmChangeKey = document.getElementById('pm-change-key');
  if(pmChangeKey) pmChangeKey.onclick = ()=>{ state.orsApiKey=''; persist(); render(); };
  const pmFind = document.getElementById('pm-find');
  if(pmFind) pmFind.onclick = findNearbyPits;
  const pmMaterialInput = document.getElementById('pm-material');
  const syncPmFieldsBeforeRerender = ()=>{
    pitMapQuery.address = (document.getElementById('pm-address')?.value||'');
    pitMapQuery.jobName = (document.getElementById('pm-jobname')?.value||'');
    pitMapQuery.maxMiles = (document.getElementById('pm-maxmiles')?.value||'');
  };
  const pmMaxMiles = document.getElementById('pm-maxmiles');
  // Partial refresh only (not a full render()) — a full render also reinitializes the
  // Leaflet map on this tab, which was yanking the page's scroll position back up to
  // the map on every single keystroke while typing a number here.
  if(pmMaxMiles) pmMaxMiles.oninput = ()=>{ pitMapQuery.maxMiles = pmMaxMiles.value; refreshPitMapResults(); };
  const addPmMaterial = ()=>{
    const val = (pmMaterialInput?.value||'').trim();
    if(!val) return;
    if(!pitMapQuery.materials.includes(val)) pitMapQuery.materials.push(val);
    syncPmFieldsBeforeRerender();
    render();
  };
  const pmMaterialAdd = document.getElementById('pm-material-add');
  if(pmMaterialAdd) pmMaterialAdd.onclick = addPmMaterial;
  if(pmMaterialInput) pmMaterialInput.onkeydown = (e)=>{ if(e.key==='Enter'){ e.preventDefault(); addPmMaterial(); } };
  document.querySelectorAll('[data-remove-pm-material]').forEach(b=>b.onclick=()=>{
    pitMapQuery.materials = pitMapQuery.materials.filter(m=>m!==b.dataset.removePmMaterial);
    syncPmFieldsBeforeRerender();
    render();
  });
  attachPitMapResultsHandlers();
  const refreshPitMapCalc = ()=>{
    const out = document.getElementById('pm-compare-output');
    if(out) out.innerHTML = renderPitMapCompareHTML();
  };
  ['pm-dayrate','pm-hours','pm-loadmin','pm-unloadmin','pm-capacity'].forEach(id=>{
    const el = document.getElementById(id);
    if(!el) return;
    const key = {'pm-dayrate':'dayRate','pm-hours':'hours','pm-loadmin':'loadMin','pm-unloadmin':'unloadMin','pm-capacity':'capacity'}[id];
    el.oninput = ()=>{ pitMapCalc[key] = el.value; refreshPitMapCalc(); };
  });
  const pmCapUnit = document.getElementById('pm-capunit');
  if(pmCapUnit) pmCapUnit.onchange = ()=>{
    pitMapCalc.capacityUnit = pmCapUnit.value;
    pitMapCalc.capacity = CAPACITY_DEFAULTS[pmCapUnit.value] || pitMapCalc.capacity;
    const capEl = document.getElementById('pm-capacity');
    if(capEl) capEl.value = pitMapCalc.capacity;
    refreshPitMapCalc();
  };

  // Invoice buttons
  document.querySelectorAll('[data-invoice]').forEach(b=>b.onclick=()=>{
    const [company, partyEnc, startDate, endDate] = b.dataset.invoice.split('|');
    openInvoice(company, decodeURIComponent(partyEnc), {startDate, endDate});
  });

  // Excel export
  document.querySelectorAll('[id^="export-loads-"]').forEach(b=>b.onclick=()=>{
    exportLoadsExcel(b.id.replace('export-loads-',''));
  });
  const exportAllBtn = document.getElementById('export-all-btn');
  if(exportAllBtn) exportAllBtn.onclick = exportAllExcel;

  // JSON backup / restore
  const backupBtn = document.getElementById('backup-json-btn');
  if(backupBtn) backupBtn.onclick = async ()=>{
    const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
    const filename = `Jarelys_Command_Center_Backup_${new Date().toISOString().slice(0,10)}.json`;
    await writeBlobToFolderOrDownload(blob, filename);
    localStorage.setItem(BACKUP_REMINDER_KEY, new Date().toISOString());
    if(activeTab==='dashboard') render();
  };
  const restoreBtn = document.getElementById('restore-json-btn');
  if(restoreBtn) restoreBtn.onclick = ()=>{
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.json,application/json';
    input.onchange = ()=>{
      const file = input.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ()=>{
        try{
          const parsed = JSON.parse(reader.result);
          if(!parsed || !Array.isArray(parsed.loads)) throw new Error('Not a valid backup file');
          const cur = state.loads.length + state.expenses.length;
          const doRestore = ()=>{
            state = Object.assign(state, parsed);
            state.loads.forEach(computeLoadFinancials);
            persist(); render();
            alert('Backup restored ✓');
          };
          if(cur>0){
            showConfirm(`Restore backup? This will REPLACE your current data (${state.loads.length} loads, ${state.expenses.length} expenses) with the backup (${parsed.loads.length} loads, ${(parsed.expenses||[]).length} expenses).`, doRestore);
          } else {
            doRestore();
          }
        }catch(e){ alert('Could not read that file — make sure it\'s a backup downloaded from the "Backup Data" button. ('+e.message+')'); }
      };
      reader.readAsText(file);
    };
    input.click();
  };
  const connectFolderBtn = document.getElementById('connect-folder-btn');
  if(connectFolderBtn) connectFolderBtn.onclick = connectExportFolder;

  // Invoices tab
  const ivGenerate = document.getElementById('iv-generate');
  if(ivGenerate) ivGenerate.onclick = ()=>{
    const company = document.getElementById('iv-company').value;
    const party = document.getElementById('iv-party').value.trim();
    const startDate = document.getElementById('iv-start').value;
    const endDate = document.getElementById('iv-end').value;
    if(!party){ alert('Type a broker or client name first.'); return; }
    if(!startDate || !endDate){ alert('Pick a From and To date first.'); return; }
    if(startDate > endDate){ alert('The From date must be on or before the To date.'); return; }
    openInvoice(company, party, {startDate, endDate});
  };
  const ivPrintAll = document.getElementById('iv-printall');
  if(ivPrintAll) ivPrintAll.onclick = ()=> printAllForWeek(currentWeekEnding);
  document.querySelectorAll('[data-view-inv]').forEach(b=>b.onclick=()=>{
    const invoiceNum = b.dataset.viewInv;
    const inv = getAllInvoices().find(i=>i.invoiceNum===invoiceNum);
    if(inv) openInvoice(inv.company, inv.party, {invoiceNum});
  });
  document.querySelectorAll('[data-copy-inv]').forEach(b=>b.onclick=()=>{
    const invoiceNum = b.dataset.copyInv;
    const inv = getAllInvoices().find(i=>i.invoiceNum===invoiceNum);
    if(inv) copyInvoiceText(inv.company, inv.party, {invoiceNum});
  });
}

/* ============================= AUTH ============================= */
function showLoginScreen(){
  document.getElementById('boot-loading').style.display = 'none';
  document.getElementById('shell').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}
function showApp(){
  document.getElementById('boot-loading').style.display = 'none';
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('shell').style.display = 'flex';
  document.getElementById('user-email').textContent = currentUser.email + (currentUserRole==='owner' ? ' · Owner' : ' · Sales Rep');
}
async function fetchCurrentUserRole(user){
  const { data, error } = await sbClient.from('profiles').select('role').eq('id', user.id).maybeSingle();
  if(error){ console.error('Failed to fetch profile role', error); return 'sales_rep'; }
  return data ? data.role : 'sales_rep';
}

const loginSubmitBtn = document.getElementById('login-submit');
const loginEmailInput = document.getElementById('login-email');
const loginPasswordInput = document.getElementById('login-password');
const loginErrorBox = document.getElementById('login-error');
async function doLogin(){
  loginErrorBox.style.display = 'none';
  loginSubmitBtn.disabled = true; loginSubmitBtn.textContent = 'Signing in…';
  const { error } = await sbClient.auth.signInWithPassword({ email: loginEmailInput.value.trim(), password: loginPasswordInput.value });
  loginSubmitBtn.disabled = false; loginSubmitBtn.textContent = 'Sign In';
  if(error){ loginErrorBox.textContent = error.message; loginErrorBox.style.display = 'block'; }
}
loginSubmitBtn.onclick = doLogin;
loginPasswordInput.onkeydown = (e)=>{ if(e.key==='Enter') doLogin(); };
document.getElementById('signout-btn').onclick = ()=> sbClient.auth.signOut();

const newpwInput = document.getElementById('newpw-input');
const newpwConfirmInput = document.getElementById('newpw-confirm-input');
const newpwErrorBox = document.getElementById('newpw-error');
const newpwSuccessBox = document.getElementById('newpw-success');
const newpwSaveBtn = document.getElementById('newpw-save-btn');
function showChangePassword(){
  newpwInput.value = ''; newpwConfirmInput.value = '';
  newpwErrorBox.style.display = 'none'; newpwSuccessBox.style.display = 'none';
  document.getElementById('password-overlay').style.display = 'flex';
}
function hideChangePassword(){
  document.getElementById('password-overlay').style.display = 'none';
}
async function doChangePassword(){
  newpwErrorBox.style.display = 'none'; newpwSuccessBox.style.display = 'none';
  const pw = newpwInput.value, confirm = newpwConfirmInput.value;
  if(pw.length < 6){ newpwErrorBox.textContent = 'Password must be at least 6 characters.'; newpwErrorBox.style.display = 'block'; return; }
  if(pw !== confirm){ newpwErrorBox.textContent = 'Passwords do not match.'; newpwErrorBox.style.display = 'block'; return; }
  newpwSaveBtn.disabled = true; newpwSaveBtn.textContent = 'Saving…';
  const { error } = await sbClient.auth.updateUser({ password: pw });
  newpwSaveBtn.disabled = false; newpwSaveBtn.textContent = 'Save';
  if(error){ newpwErrorBox.textContent = error.message; newpwErrorBox.style.display = 'block'; return; }
  newpwInput.value = ''; newpwConfirmInput.value = '';
  newpwSuccessBox.textContent = 'Password updated.'; newpwSuccessBox.style.display = 'block';
}
document.getElementById('changepw-btn').onclick = showChangePassword;
document.getElementById('newpw-cancel-btn').onclick = hideChangePassword;
document.getElementById('newpw-save-btn').onclick = doChangePassword;
newpwConfirmInput.onkeydown = (e)=>{ if(e.key==='Enter') doChangePassword(); };

let appBooted = false;
let authResolved = false;
sbClient.auth.onAuthStateChange(async (event, session)=>{
  if(session){
    currentUser = session.user;
    currentUserRole = await fetchCurrentUserRole(session.user);
    if(currentUserRole==='sales_rep' && !ALLOWED_TABS_FOR_SALES_REP.includes(activeTab)) activeTab = 'salesteam';
    showApp();
    authResolved = true; // only once the boot screen is actually dismissed — an async step above (e.g. the profile-role fetch) can itself hang, and the watchdog needs to catch that too, not just a totally silent callback
    if(!appBooted){ appBooted = true; await loadState(); }
  } else {
    appBooted = false;
    currentUser = null; currentUserRole = null;
    showLoginScreen();
    authResolved = true;
  }
});
// Watchdog: Supabase's auth client can occasionally get stuck (a known
// intermittent issue with its internal session lock) and never fire the
// callback above, leaving the boot screen stuck on "Loading…" forever with
// no way out for someone who doesn't know to open DevTools and clear
// localStorage themselves. Surface a one-click recovery button instead.
setTimeout(()=>{
  if(!authResolved) document.getElementById('boot-stuck').style.display = 'block';
}, 8000);
document.getElementById('boot-reset-btn').onclick = ()=>{
  Object.keys(localStorage).filter(k=>k.startsWith('sb-')).forEach(k=>localStorage.removeItem(k));
  window.location.reload();
};

/* ============================= INIT ============================= */
// loadState() is kicked off from the auth listener above once a session is confirmed.
</script>
