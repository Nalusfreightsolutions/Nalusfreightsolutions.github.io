const MAINTENANCE_CATEGORIES = ['Tires','Oil Change','Brakes','Transmission','Truck Repair (Other)','Truck Repair'];
// The owner's own company trucks — independent drivers use their own trucks,
// which aren't tracked here since maintenance on those isn't the company's concern.
// Same list doubles as "my drivers" (truck # = driver name, by the owner's convention)
// for the truck-wash payroll deduction below.
const MY_TRUCKS = ['Nalu Nui - Nelson','Nalu Nui - Edel','Nalu Nui - Carlos','Nalu Nui - Yandier'];
const TRUCK_WASH_DEDUCTION = 50;
// Editable per-driver, per-week deductions (any driver, not just company drivers).
// Defaults to $50/week for the owner's own drivers, $0 for everyone else, until
// the owner explicitly overrides it for that exact driver + week.
function getEffectiveDeduction(driver, weekStart, weekEnd){
  const match = state.payrollDeductions.find(d=> d.driver===driver && d.weekStart===weekStart && d.weekEnd===weekEnd);
  if(match) return Number(match.amount)||0;
  return MY_TRUCKS.includes(driver) ? TRUCK_WASH_DEDUCTION : 0;
}
function setDeduction(company, driver, weekStart, weekEnd, amount){
  let d = state.payrollDeductions.find(d=> d.driver===driver && d.weekStart===weekStart && d.weekEnd===weekEnd);
  if(!d){
    d = { id:uid(), company, driver, weekStart, weekEnd, amount:0, note:'' };
    state.payrollDeductions.push(d);
  }
  d.amount = Number(amount)||0;
  persist();
}
// Payment tracking on the same per-driver-per-week record: what the driver
// was paid with (check # or "Zelle") and whether that check has actually
// been deposited yet.
function getPayrollRecord(driver, weekStart, weekEnd){
  return state.payrollDeductions.find(d=> d.driver===driver && d.weekStart===weekStart && d.weekEnd===weekEnd) || null;
}
function setPayrollField(company, driver, weekStart, weekEnd, field, value){
  let d = getPayrollRecord(driver, weekStart, weekEnd);
  if(!d){
    // Seed amount with the currently effective deduction — creating this
    // record just to store a check # must not silently change the driver's
    // deduction (getEffectiveDeduction trusts an existing record's amount).
    d = { id:uid(), company, driver, weekStart, weekEnd, amount:getEffectiveDeduction(driver, weekStart, weekEnd), note:'', payRef:'', deposited:false };
    state.payrollDeductions.push(d);
  }
  d[field] = value;
  persist();
}
// One-time migration: the owner's 4 company drivers/trucks used to be logged
// under plain first names — renaming everywhere to "Nalu Nui - {name}" for clarity.
const DRIVER_NAME_MIGRATIONS = {
  'nelson': 'Nalu Nui - Nelson',
  'carlos': 'Nalu Nui - Carlos',
  'edel': 'Nalu Nui - Edel',
  'yandier': 'Nalu Nui - Yandier'
};
function migrateDriverNames(){
  let changed = false;
  const rename = (val) => {
    if(!val) return val;
    const target = DRIVER_NAME_MIGRATIONS[val.trim().toLowerCase()];
    if(target && val !== target){ changed = true; return target; }
    return val;
  };
  state.loads.forEach(l=>{
    l.driver = rename(l.driver);
    l.truck = rename(l.truck);
  });
  state.expenses.forEach(e=>{ e.truck = rename(e.truck); });
  state.compliance.forEach(r=>{ r.name = rename(r.name); });
  return changed;
}

const ATTACHMENT_TABLE_BY_TYPE = { compliance:'compliance_attachments' };
const ATTACHMENT_PARENT_FIELD_BY_TYPE = { compliance:'compliance_id' };

function compressImageFile(file){
  return new Promise((resolve)=>{
    if(!file.type.startsWith('image/')){ resolve(file); return; }
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      URL.revokeObjectURL(url);
      const MAX_DIM = 1600;
      let { width, height } = img;
      if(width > MAX_DIM || height > MAX_DIM){
        const scale = MAX_DIM / Math.max(width, height);
        width = Math.round(width*scale); height = Math.round(height*scale);
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      canvas.toBlob((blob)=>{
        resolve(blob ? new File([blob], file.name.replace(/\.[^.]+$/, '.jpg'), {type:'image/jpeg'}) : file);
      }, 'image/jpeg', 0.8);
    };
    img.onerror = ()=> resolve(file);
    img.src = url;
  });
}
async function uploadAttachment(entityType, parentId, file){
  const compressed = await compressImageFile(file);
  const table = ATTACHMENT_TABLE_BY_TYPE[entityType];
  const parentField = ATTACHMENT_PARENT_FIELD_BY_TYPE[entityType];
  const safeName = compressed.name.replace(/[^a-zA-Z0-9._-]/g, '_');
  const storagePath = `${entityType}/${parentId}/${uid()}-${safeName}`;
  const { error: upErr } = await sbClient.storage.from('attachments').upload(storagePath, compressed, { contentType: compressed.type });
  if(upErr) throw upErr;
  const row = { id: uid(), [parentField]: parentId, file_name: file.name, storage_path: storagePath, mime_type: compressed.type, uploaded_at: new Date().toISOString() };
  const { error: dbErr } = await sbClient.from(table).insert(row);
  if(dbErr){ await sbClient.storage.from('attachments').remove([storagePath]); throw dbErr; }
  return rowToAttachment(row);
}
async function deleteAttachment(entityType, attachment){
  const table = ATTACHMENT_TABLE_BY_TYPE[entityType];
  await sbClient.storage.from('attachments').remove([attachment.storagePath]);
  const { error } = await sbClient.from(table).delete().eq('id', attachment.id);
  if(error) throw error;
}
async function getAttachmentUrl(attachment){
  const { data, error } = await sbClient.storage.from('attachments').createSignedUrl(attachment.storagePath, 300);
  if(error) throw error;
  return data.signedUrl;
}
function findAttachmentParentRecord(entityType, parentId){
  if(entityType==='compliance') return state.compliance.find(c=>c.id===parentId);
}
function renderAttachmentsSection(entityType, parentId, attachments){
  if(!parentId) return `<div class="note" style="margin-top:14px;">Save this first, then you can attach files (price sheets, business cards, documents — images or PDFs).</div>`;
  const list = attachments||[];
  return `

    <button class="btn btn-ghost btn-sm" data-att-upload="${entityType}|${parentId}">📎 Upload File(s)</button>
    <span id="att-status-${entityType}-${parentId}" style="font-size:12px; color:#5C7085; margin-left:8px;"></span>
    ${list.length? `<div class="tablewrap" style="margin-top:8px;"><table><thead><tr><th>File</th><th>Uploaded</th><th></th></tr></thead><tbody>
      ${list.map(a=>`<tr><td>${(a.fileName||'').replace(/</g,'&lt;')}</td><td>${fmtDate((a.uploadedAt||'').slice(0,10))}</td><td>
        <button class="btn btn-ghost btn-sm" data-att-view="${entityType}|${a.id}">View</button>
        <button class="btn btn-danger btn-sm" data-att-del="${entityType}|${parentId}|${a.id}">Delete</button>
      </td></tr>`).join('')}
    </tbody></table></div>` : `<div class="note" style="margin-top:8px;">No files attached yet.</div>`}

function wireAttachmentHandlers(entityType, parentId){
  if(!parentId) return;
  const uploadBtn = document.querySelector(`[data-att-upload="${entityType}|${parentId}"]`);
  const fileInput = document.getElementById(`att-file-${entityType}-${parentId}`);
  const statusEl = document.getElementById(`att-status-${entityType}-${parentId}`);
  if(uploadBtn && fileInput){
    uploadBtn.onclick = ()=> fileInput.click();
    fileInput.onchange = async ()=>{
      const files = [...fileInput.files];
      if(!files.length) return;
      const record = findAttachmentParentRecord(entityType, parentId);
      if(!record) return;
      record.attachments = record.attachments || [];
      let ok=0, failed=0;
      for(const file of files){
        if(statusEl) statusEl.textContent = `Uploading ${ok+failed+1} of ${files.length}…`;
        try{
          const att = await uploadAttachment(entityType, parentId, file);
          record.attachments.push(att);
          ok++;
        }catch(e){ failed++; }
      }
      if(statusEl) statusEl.textContent = failed? `Uploaded ${ok}, ${failed} failed — check file size/type and try again.` : '';
      render();
    };
  }
  document.querySelectorAll(`[data-att-view^="${entityType}|"]`).forEach(b=>{
    b.onclick = async ()=>{
      const attId = b.dataset.attView.split('|')[1];
      const record = findAttachmentParentRecord(entityType, parentId);
      const att = record && (record.attachments||[]).find(a=>a.id===attId);
      if(!att) return;
      try{
        const url = await getAttachmentUrl(att);
        window.open(url, '_blank');
      }catch(e){ alert('Could not open file: '+e.message); }
    };
  });
  document.querySelectorAll(`[data-att-del^="${entityType}|${parentId}|"]`).forEach(b=>{
    b.onclick = ()=>{
      const attId = b.dataset.attDel.split('|')[2];
      const record = findAttachmentParentRecord(entityType, parentId);
      const att = record && (record.attachments||[]).find(a=>a.id===attId);
      if(!att) return;
      showConfirm(`Delete "${att.fileName}"? This can't be undone.`, async ()=>{
        try{
          await deleteAttachment(entityType, att);
          record.attachments = (record.attachments||[]).filter(a=>a.id!==attId);
          render();
        }catch(e){ alert('Could not delete file: '+e.message); }
      });
    };
  });
}

/* ---- NNL-scoped sync ---- */
async function syncStateToSupabase(){
  await upsertTable('loads', state.loads.map(loadToRow));
  await deleteMissing('loads', state.loads.map(l=>l.id), 'NNL');

  await upsertTable('expenses', state.expenses.map(expenseToRow));
  await deleteMissing('expenses', state.expenses.map(e=>e.id), 'NNL');

  await upsertTable('compliance', state.compliance.map(complianceToRow));
  await deleteMissing('compliance', state.compliance.map(c=>c.id));  // no company column on this table, NNL-exclusive anyway

  const annualRows = state.annual.map(annualToRow);
  await upsertTable('annual_items', annualRows);
  await deleteMissing('annual_items', annualRows.map(a=>a.id), 'NNL');

  await upsertTable('invoice_counters', [{company:'NNL', counter: state.invoiceCounter||1000}]);

  await upsertTable('payroll_deductions', state.payrollDeductions.map(payrollDeductionToRow));
  await deleteMissing('payroll_deductions', state.payrollDeductions.map(d=>d.id), 'NNL');

  if(BROKER_PAYMENTS_TABLE_EXISTS){
    await upsertTable('broker_payments', state.brokerPayments.map(brokerPaymentToRow));
    await deleteMissing('broker_payments', state.brokerPayments.map(p=>p.id), 'NNL');
  }
}

async function fetchStateFromSupabase(){
  const [loadsR, expensesR, complianceR, complianceAttachmentsR, annualR, invCounterR] = await Promise.all([
    sbClient.from('loads').select('*').eq('company','NNL'),
    sbClient.from('expenses').select('*').eq('company','NNL'),
    sbClient.from('compliance').select('*'),
    sbClient.from('compliance_attachments').select('*'),
    sbClient.from('annual_items').select('*').eq('company','NNL'),
    sbClient.from('invoice_counters').select('*').eq('company','NNL'),
  ]);
  const named = {loadsR, expensesR, complianceR, complianceAttachmentsR, annualR, invCounterR};
  for(const [k,v] of Object.entries(named)){ if(v.error) throw new Error(k+': '+v.error.message); }

  state.loads = (loadsR.data||[]).map(rowToLoad);
  state.expenses = (expensesR.data||[]).map(rowToExpense);
  const complianceAttachments = complianceAttachmentsR.data||[];
  state.compliance = (complianceR.data||[]).map(r=>rowToCompliance(r, complianceAttachments));
  state.annual = (annualR.data||[]).map(rowToAnnual);
  const invRow = (invCounterR.data||[])[0];
  state.invoiceCounter = invRow ? invRow.counter : 1000;

  // Fetched separately: this table may not exist yet if the owner hasn't run the
  // one-time setup SQL, and a missing table here shouldn't break everything else's load.
  try{
    const { data, error } = await sbClient.from('payroll_deductions').select('*').eq('company','NNL');
    if(error) throw error;
    state.payrollDeductions = (data||[]).map(rowToPayrollDeduction);
    // Separate probe for the payment-tracking columns (pay_ref/deposited),
    // which were added later than the table itself.
    try{
      const probe = await sbClient.from('payroll_deductions').select('pay_ref').limit(1);
      if(probe.error) throw probe.error;
      PAYROLL_PAYREF_COLUMNS_EXIST = true;
    }catch(e2){
      PAYROLL_PAYREF_COLUMNS_EXIST = false;
      console.warn('payroll_deductions.pay_ref/deposited columns not available yet — run the setup SQL to enable payroll payment tracking.', e2.message||e2);
    }
  }catch(e){
    console.warn('payroll_deductions not available yet — run the setup SQL to enable editable payroll deductions.', e.message||e);
    state.payrollDeductions = [];
  }

  // Same guarded pattern: broker payment recording stays disabled (and is
  // excluded from saves) until the one-time setup SQL creates the table.
  try{
    const { data, error } = await sbClient.from('broker_payments').select('*').eq('company','NNL');
    if(error) throw error;
    state.brokerPayments = (data||[]).map(rowToBrokerPayment);
    BROKER_PAYMENTS_TABLE_EXISTS = true;
  }catch(e){
    console.warn('broker_payments not available yet — run the setup SQL to enable recording broker payments.', e.message||e);
    state.brokerPayments = [];
    BROKER_PAYMENTS_TABLE_EXISTS = false;
  }
}

// Tracks whether loadState() has actually finished populating `state` from
// Supabase. persist() refuses to run before this is true — every table sync is a
// "delete anything not in the current in-memory list" diff against the database,
// so calling it while `state` is still incomplete (e.g. right after a fresh page
// load, before the fetch resolves) would wipe out real rows that just hadn't been
// loaded into memory yet. This isn't reachable through normal UI use (nothing is
// even clickable until render() has run at the end of loadState()), but it's cheap,
// real insurance against exactly that failure mode from any other code path.
let initialLoadComplete = false;
async function loadState(){
  try{
    // "Is this a fresh database?" signal: compliance is NNL-exclusive and always
    // has 4 seed rows (c1-c4) in a fresh state, so an empty compliance table means
    // this app has never pushed its starter data yet.
    const { count, error } = await sbClient.from('compliance').select('id', {count:'exact', head:true});
    if(error) throw error;
    if(!count){
      // Fresh database — push this app's built-in starter data (compliance
      // defaults, annual items) up to Supabase once.
      await syncStateToSupabase();
    } else {
      await fetchStateFromSupabase();
    }
  }catch(e){
    console.error('Supabase load failed', e);
    const main = document.getElementById('main');
    if(main) main.insertAdjacentHTML('afterbegin', `<div style="background:#FDEDEC;border:1.5px solid var(--bad-500);color:var(--bad-500);padding:12px 16px;border-radius:8px;margin-bottom:14px;font-size:13px;"><strong>Could not connect to the database:</strong> ${((e&&e.message)||e+'').replace(/</g,'&lt;')}. Check your internet connection and reload.</div>`);
  }
  initialLoadComplete = true;
  if(migrateDriverNames()) persist();
  render();
}

let saveTimer = null;
function persist(){
  if(!initialLoadComplete){
    console.error('persist() called before initial data load finished — refusing to save to avoid wiping unloaded data. This should never happen through normal use of the app.');
    return;
  }
  document.getElementById('savetext').textContent = 'Saving…';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{
      await syncStateToSupabase();
      document.getElementById('savetext').textContent = 'Saved automatically';
    }catch(e){
      console.error('Supabase save failed', e);
      document.getElementById('savetext').textContent = 'Save failed — retry';
    }
  }, 300);
}

/* ============================= COMPUTED HELPERS ============================= */
function computeLoadFinancials(l){
  const qty = Number(l.qty)||0, rate = Number(l.rate)||0;
  l.revenue = qty*rate;
  const driverRate = Number(l.driverRate)||0;
  if(l.driverType!=='Independent Driver'){
    // Company drivers (the default/majority case): automatic 30% split.
    // Normally 30% of the broker revenue, but if this driver has their own
    // rate that differs from the broker rate, the 30% comes out of THEIR
    // rate instead (e.g. driver rate $6/yd vs broker rate $6.35/yd — the
    // driver's 30% cut is based on the $6, not the $6.35).
    const driverBasis = driverRate>0 ? qty*driverRate : l.revenue;
    l.driverPay = +(driverBasis*0.3).toFixed(2);
  } else {
    // Independent drivers: paid their own per-unit rate in full, no cut —
    // multiplied by this load's quantity (same as how the broker Rate becomes revenue).
    l.driverPay = +(qty*driverRate).toFixed(2);
  }
  l.net = +(l.revenue - l.driverPay).toFixed(2);
  return l;
}
function loadsFor(company){ return state.loads.filter(l=>l.company===company); }
function findDuplicateTicket(company, ticket, excludeId){
  const t = (ticket||'').toString().trim();
  if(!t) return null;
  return state.loads.find(l => l.company===company && l.id!==excludeId && (l.ticket||'').toString().trim()===t) || null;
}
function findAllDuplicateTickets(company){
  const groups = {};
  loadsFor(company).forEach(l=>{
    const t = (l.ticket||'').toString().trim();
    if(!t) return;
    (groups[t] = groups[t]||[]).push(l);
  });
  return Object.entries(groups).filter(([,items])=>items.length>1).sort((a,b)=>a[0].localeCompare(b[0]));
}
let dupTicketCheck = { NNL: null };
function renderDupTicketPanel(company){
  const results = dupTicketCheck[company];
  if(results===null) return '';
  if(!results.length) return `<div class="note" style="margin-bottom:14px; border-color:var(--good-500,#2E7D32);">✓ No duplicate ticket numbers found.</div>`;
  const partyLabel = 'Broker';
  return `
  <div class="card" style="border-color:var(--bad-500,#C0362C); margin-bottom:14px;">
    <h2>⚠ Duplicate Ticket Numbers <span class="tag">${results.length} ticket number(s) used more than once</span></h2>
    ${results.map(([ticket,items])=>`

        <div class="tablewrap"><table><thead><tr><th>Date</th><th>${partyLabel}</th><th>Qty</th><th>Revenue</th><th></th></tr></thead><tbody>
          ${items.map(l=>`<tr><td>${fmtDate(l.date)}</td><td>${l.party||l.broker||''}</td><td class="num">${l.qty||''}</td><td class="num">${fmtMoney(l.revenue)}</td><td><button class="btn btn-ghost btn-sm" data-edit-load="${l.id}">Edit</button></td></tr>`).join('')}
        </tbody></table></div>

/* ============================= OVERDUE ALERTS ============================= */
function paymentsForBroker(broker){
  const key = (broker||'').trim().toLowerCase();
  return state.brokerPayments.filter(p=>(p.broker||'').trim().toLowerCase()===key);
}
function getOverdueInvoices(){
  const today = new Date().toISOString().slice(0,10);
  const flagged = state.loads.filter(l=> l.status!=='Paid' && l.date);
  const groups = {};
  flagged.forEach(l=>{
    const key = (l.party||'').trim().toLowerCase();
    if(!groups[key]) groups[key] = {party:l.party, items:[]};
    groups[key].items.push(l);
  });
  // Brokers with recorded checks but no unpaid loads still get a row — either
  // an overpayment credit, or a settled cycle whose history hasn't been
  // cleared yet. They'd otherwise vanish from view while money is unaccounted.
  state.brokerPayments.forEach(p=>{
    const key = (p.broker||'').trim().toLowerCase();
    if(!groups[key]) groups[key] = {party:p.broker, items:[]};
  });
  return Object.values(groups).map(g=>{
    const loadDates = g.items.map(l=>l.date).sort();
    const oldestDate = loadDates[0]||null;
    const daysOverdue = oldestDate? Math.max(0, Math.round((new Date(today)-new Date(oldestDate))/86400000)) : 0;
    const billed = sum(g.items,'revenue');
    const payments = paymentsForBroker(g.party);
    const paid = +sum(payments,'amount').toFixed(2);
    return { ...g, billed, paid, payments, balance:+(billed-paid).toFixed(2), daysOverdue, oldestDate };
  }).filter(g=>g.items.length || g.payments.length)
    .sort((a,b)=> b.daysOverdue - a.daysOverdue);
}
function brokerPaymentLogHtml(o){
  if(!o.payments.length) return '';
  return `<div style="margin-top:4px;">${o.payments.map(p=>
    `<div style="font-size:11px; color:#5C7085; white-space:nowrap;">${fmtDate(p.date)} · ${fmtMoney(p.amount)}${p.note? ' · '+p.note : ''} <button data-del-broker-payment="${p.id}" style="background:none; border:none; color:var(--bad-500); cursor:pointer; font-size:11px; padding:0 2px;" title="Remove this payment">✕</button></div>`
  ).join('')}</div>`;
}
function renderOverdueBanner(){
  const overdue = getOverdueInvoices();
  if(!overdue.length){
    return `<div class="card"><div class="balancebar ok"><span>NNL — all caught up, nothing outstanding ✓</span><span></span></div></div>`;
  }
  const totalOverdue = sum(overdue,'balance');
  const recordCell = o => BROKER_PAYMENTS_TABLE_EXISTS ? `
    <div style="display:flex; gap:6px; justify-content:flex-end;">
      <input type="number" step="0.01" min="0" placeholder="0.00" data-broker-payment-input="${encodeURIComponent(o.party)}" style="width:90px; padding:5px 7px; border:1.5px solid var(--steel-200); border-radius:6px; font-size:12.5px;">
      <input type="text" placeholder="Check # (optional)" data-broker-payment-note="${encodeURIComponent(o.party)}" style="width:120px; padding:5px 7px; border:1.5px solid var(--steel-200); border-radius:6px; font-size:12.5px;">
      <button class="btn btn-primary btn-sm" data-add-broker-payment="${encodeURIComponent(o.party)}">+ Add</button>
      ${(!o.items.length || Math.abs(o.balance)<0.01)? `<button class="btn btn-ghost btn-sm" data-settle-broker="${encodeURIComponent(o.party)}" title="Mark these loads Paid and clear this broker's check history">Settle</button>` : ''}
    </div>` : `<span style="font-size:11px; color:#9FB0C3;">Run the setup SQL to enable</span>`;
  return `
  <div class="card" style="border-color:#F3B9B4;">
    <h2 style="color:var(--bad-500);">⚠ NNL Overdue — Not Yet Paid <span class="tag">${fmtMoney(totalOverdue)} outstanding</span></h2>
    <div class="tablewrap"><table>
      <thead><tr><th>Broker</th><th>Days Outstanding</th><th>Billed (Unpaid Loads)</th><th>Paid</th><th>Balance Due</th><th>Record a Payment</th></tr></thead>
      <tbody>
        ${overdue.map(o=>`<tr>
          <td><strong>${o.party}</strong></td>
          <td class="num" style="color:var(--bad-500);font-weight:700;">${o.items.length? o.daysOverdue+'d' : '—'}</td>
          <td class="num">${fmtMoney(o.billed)}</td>
          <td class="num">${fmtMoney(o.paid)}${brokerPaymentLogHtml(o)}</td>
          <td class="num" style="font-weight:700; color:${o.balance>0.01?'var(--bad-500)':'var(--good-500)'};">${fmtMoney(o.balance)}${o.balance<-0.01? ' (credit)':''}</td>
          <td>${recordCell(o)}</td>
        </tr>`).join('')}
      </tbody>
    </table></div>
    <div class="note" style="margin-top:10px;">Log each check as it arrives — short payments stay visible as a Balance Due instead of disappearing when loads get marked Paid. Once a broker's balance hits $0 (or you're done chasing it), click <strong>Settle</strong> to mark those loads Paid and clear the check history for the next cycle.</div>
  </div>`;
}

    <div class="tablewrap">

function refreshJobTicketRows(company){
  const region = document.getElementById('job-ticket-rows-'+company);
  if(!region) return;
  region.innerHTML = jobTicketRowsInner(company);
  attachJobTicketRowHandlers(company);
}

function attachJobTicketRowHandlers(company){
  const region = document.getElementById('job-ticket-rows-'+company);
  if(!region) return;
  jobTicketRows.forEach((r,idx)=>{
    const t = document.getElementById(`jt-ticket-${company}-${idx}`);
    const tr = document.getElementById(`jt-truck-${company}-${idx}`);
    const dr = document.getElementById(`jt-driver-${company}-${idx}`);
    const q = document.getElementById(`jt-qty-${company}-${idx}`);
    if(t) t.oninput = ()=> jobTicketRows[idx].ticket = t.value;
    if(tr) tr.oninput = ()=> jobTicketRows[idx].truck = tr.value;
    if(dr) dr.oninput = ()=> jobTicketRows[idx].driver = dr.value;
    if(q) q.oninput = ()=>{ jobTicketRows[idx].qty = q.value; refreshRevenuePreview(company, idx); refreshTicketTotals(company); };
  });
  region.querySelectorAll('[data-remove-ticket-row]').forEach(b=>b.onclick=()=>{
    const idx = Number(b.dataset.removeTicketRow);
    jobTicketRows.splice(idx,1);
    if(!jobTicketRows.length) jobTicketRows.push(mkEmptyTicketRow());
    refreshJobTicketRows(company);
  });
}
function refreshRevenuePreview(company, idx){
  const row = document.querySelectorAll(`#job-ticket-rows-${company} tbody tr`)[idx];
  if(!row) return;
  const rate = Number(jobShared.rate)||0;
  const qty = Number(jobTicketRows[idx].qty)||0;
  const previewCol = jobShared.sameTruckDriver ? 3 : 5;
  const cell = row.querySelector(`td:nth-child(${previewCol})`);
  if(cell) cell.textContent = qty ? fmtMoney(qty*rate) : '—';
}
function refreshAllRevenuePreviews(company){
  jobTicketRows.forEach((r,idx)=>refreshRevenuePreview(company,idx));
  refreshTicketTotals(company);
}
function refreshTicketTotals(company){
  const rate = Number(jobShared.rate)||0;
  const totalQty = jobTicketRows.reduce((sum,r)=> sum + (Number(r.qty)||0), 0);
  const totalRevenue = jobTicketRows.reduce((sum,r)=> sum + (Number(r.qty)||0)*rate, 0);
  const qtyCell = document.getElementById(`jt-total-qty-${company}`);
  const revCell = document.getElementById(`jt-total-revenue-${company}`);
  if(qtyCell) qtyCell.textContent = totalQty || '—';
  if(revCell) revCell.textContent = totalRevenue ? fmtMoney(totalRevenue) : '—';
}

function attachJobSharedHandlers(company){
  const s = jobShared;
  const bind = (id, key, onchange) => {
    const el = document.getElementById(id);
    if(el) el.oninput = ()=>{ s[key]=el.value; if(onchange) onchange(); };
  };
  bind('js-date','date'); bind('js-party','party');
  bind('js-pit','pit'); bind('js-customer','customer'); bind('js-jobname','jobName');
  bind('js-drivertype','driverType');
  bind('js-paymenttype','paymentType');
  bind('js-rate','rate', ()=>refreshAllRevenuePreviews(company));
  bind('js-driverrate','driverRate'); bind('js-status','status');
  bind('js-sharedtruck','sharedTruck'); bind('js-shareddriver','sharedDriver');

  const sameTruckDriverBox = document.getElementById('js-sametruckdriver');
  if(sameTruckDriverBox) sameTruckDriverBox.onchange = ()=>{
    s.sameTruckDriver = sameTruckDriverBox.checked;
    refreshJobTicketCard(company);
  };

  const addRowBtn = document.getElementById('job-add-row-'+company);
  if(addRowBtn) addRowBtn.onclick = ()=>{
    const firstTruck = document.getElementById(`jt-truck-${company}-0`);
    const firstDriver = document.getElementById(`jt-driver-${company}-0`);
    jobTicketRows.push(mkEmptyTicketRow({truck: firstTruck?firstTruck.value:'', driver: firstDriver?firstDriver.value:''}));
    refreshJobTicketRows(company);
  };
  const clearBtn = document.getElementById('job-clear-'+company);
  if(clearBtn) clearBtn.onclick = ()=>{
    showConfirm('Clear this job entry? Any unsaved tickets will be lost.', ()=>{
      jobShared = mkDefaultJobShared();
      jobTicketRows = [mkEmptyTicketRow(),mkEmptyTicketRow(),mkEmptyTicketRow()];
      refreshJobTicketCard(company);
    });
  };
  const saveBtn = document.getElementById('job-save-all-'+company);
  if(saveBtn) saveBtn.onclick = ()=> saveAllTickets(company);

  attachJobTicketRowHandlers(company);
}
function refreshJobTicketCard(company){
  const card = document.getElementById('job-ticket-card-'+company);
  if(!card) return;
  card.innerHTML = renderJobTicketForm(company);
  attachJobSharedHandlers(company);
}

function saveAllTickets(company){
  const s = jobShared;
  if(!s.date || !s.party){ alert(`Add a date and broker name before saving tickets.`); return; }
  if(!s.rate){ alert('Add a rate before saving tickets.'); return; }
  const validRows = jobTicketRows.filter(r => String(r.qty).trim() !== '');
  if(!validRows.length){ alert('Add at least one ticket with a quantity.'); return; }

  // Duplicate ticket check: against loads already saved, and within this batch itself.
  const seenInBatch = {};
  const dupTickets = new Set();
  validRows.forEach(r=>{
    const t = (r.ticket||'').toString().trim();
    if(!t) return;
    if(seenInBatch[t]) dupTickets.add(t);
    seenInBatch[t] = true;
    if(findDuplicateTicket(company, t, null)) dupTickets.add(t);
  });

  const finishSave = ()=>{
    let created = 0;
    validRows.forEach(r=>{
      const l = {
        id: uid(), company, date: s.date, party: s.party, ticket: r.ticket,
        truck: s.sameTruckDriver ? s.sharedTruck : r.truck,
        driver: s.sameTruckDriver ? s.sharedDriver : r.driver,
        paymentType: s.paymentType, qty: r.qty, rate: s.rate,
        status: s.status, invoiceNum:'', datePaid:'', notes:'',
        pit: s.pit, customer: s.customer, jobName: s.jobName, driverType: s.driverType, driverRate: s.driverRate
      };
      computeLoadFinancials(l);
      state.loads.push(l);
      created++;
    });
    persist();
    jobTicketRows = [mkEmptyTicketRow(),mkEmptyTicketRow(),mkEmptyTicketRow()];
    alert(`Saved ${created} ticket(s) for ${s.party}.`);
    render();
  };

  if(dupTickets.size){
    showConfirm(`Ticket # already used: ${[...dupTickets].join(', ')}. Save these tickets anyway?`, finishSave);
  } else {
    finishSave();
  }
}

function distinctVals(company, key){
  const s = new Set();
  loadsFor(company).forEach(l=>{ const v=(l[key]||'').toString().trim(); if(v) s.add(v); });
  return [...s].sort((a,b)=>a.localeCompare(b));
}

  const inp = 'padding:7px 9px; border:1.5px solid var(--steel-200); border-radius:6px; font-size:12.5px; background:#fff;';
  const items = selectedLoadObjects(company);

  return state.expenses.filter(e=>e.truck===truck && MAINTENANCE_CATEGORIES.includes(e.category))

function daysUntil(dateStr){
  if(!dateStr) return null;
  return Math.round((new Date(dateStr+'T00:00:00') - new Date(new Date().toDateString())) / 86400000);
}
function complianceStatus(row){
  const today = new Date().toISOString().slice(0,10);
  const curYear = new Date().getFullYear();
  const issues = [];
  if(!row.coiDate) issues.push('Missing COI');
  else if(row.coiDate < today) issues.push('COI Expired');
  else if(daysUntil(row.coiDate) <= 30) issues.push('COI Expiring Soon');

  if(!row.w9Year) issues.push('Missing W-9');
  else if(Number(row.w9Year) < curYear) issues.push('W-9 Outdated');

  if(!row.wcDate) issues.push('Missing WC');
  else if(row.wcDate < today) issues.push('WC Expired');
  else if(daysUntil(row.wcDate) <= 30) issues.push('WC Expiring Soon');

  if(!issues.length) return {label:'Complete', tone:'paid'};
  if(issues.some(i=>i.includes('Missing') || i.includes('Expired') && !i.includes('Soon'))) return {label:issues.join('; '), tone:'pending'};
  return {label:issues.join('; '), tone:'invoiced'};
}

function renderWeeklyTab(){
  if(!weeklyRange.start || !weeklyRange.end){
    weeklyRange = { start: addDays(currentWeekEnding,-6), end: currentWeekEnding };
  }
  const { start, end } = weeklyRange;
  const wkLoadsAll = state.loads.filter(l=> l.date && l.date>=start && l.date<=end);
  const nnl = wkLoadsAll.filter(l=>l.company==='NNL');

  const nnlRev=sum(nnl,'revenue'), nnlPay=sum(nnl,'driverPay'), nnlNet=sum(nnl,'net');

  const nnlByBroker = groupBy(nnl,'party');
  const allDrivers = groupBy(wkLoadsAll,'driver');

  const totalInvoiced = nnlRev;
  const totalPayNet = nnlPay+nnlNet;
  const balanced = Math.abs(totalInvoiced-totalPayNet) < 0.01;
  const mismatchedLoads = wkLoadsAll.filter(l=>{
    const diff = (Number(l.driverPay)||0) + (Number(l.net)||0) - (Number(l.revenue)||0);
    return Math.abs(diff) > 0.01;
  });

  function groupTable(groupObj, revKey, payKey, netKey, nameLabel, company){
    const entries = Object.entries(groupObj);
    if(!entries.length) return `<div class="empty">No loads in this range yet.</div>`;
    return `<div class="tablewrap"><table><thead><tr><th>${nameLabel}</th><th># Loads</th><th>Revenue</th><th>Driver Pay</th><th>Net</th><th></th></tr></thead><tbody>
      ${entries.map(([name,items])=>`<tr><td><strong>${name}</strong></td><td class="num">${items.length}</td><td class="num">${fmtMoney(sum(items,'revenue'))}</td><td class="num">${fmtMoney(sum(items,'driverPay'))}</td><td class="num">${fmtMoney(sum(items,'net'))}</td><td><button class="btn btn-primary btn-sm" data-invoice="${company}|${encodeURIComponent(name)}|${start}|${end}">Print Invoice</button></td></tr>`).join('')}
    </tbody></table></div>`;
  }
  function driverComplianceFlag(driverName){
    if(!driverName) return '';
    const match = state.compliance.find(r=>(r.name||'').trim().toLowerCase()===driverName.trim().toLowerCase());
    if(!match) return 'No Compliance Record';
    const s = complianceStatus(match);
    return s.label==='Complete' ? '' : s.label;
  }
  function driverNameCell(driverName){
    const flag = driverComplianceFlag(driverName);
    if(!flag) return `<strong>${driverName}</strong>`;
    return `<strong style="color:#C0362C;">⚠ ${driverName}</strong><div style="font-size:10.5px; color:#C0362C; font-weight:600;" title="${flag}">Missing/expired paperwork — hold pay</div>`;
  }
  function driverTable(groupObj){
    const entries = Object.entries(groupObj);
    if(!entries.length) return `<div class="empty">No loads in this range yet.</div>`;
    let totalNet = 0;
    const bodyRows = entries.map(([name,items])=>{
      const companies = [...new Set(items.map(i=>i.company))].join(' + ');
      const primaryCompany = items[0].company;
      const owed = sum(items,'driverPay');
      const deduction = getEffectiveDeduction(name, start, end);
      const netPay = owed - deduction;
      totalNet += netPay;
      const rec = getPayrollRecord(name, start, end);
      const nameAttr = name.replace(/"/g,'&quot;');
      const payCells = PAYROLL_PAYREF_COLUMNS_EXIST ? `
        <td><input type="text" class="payref-input" placeholder="Check # / Zelle" data-driver="${nameAttr}" data-company="${primaryCompany}" value="${((rec&&rec.payRef)||'').replace(/"/g,'&quot;')}" style="width:110px; border:1px solid var(--steel-200); border-radius:5px; padding:5px 7px;"></td>

        : `<td colspan="2" style="font-size:11px; color:#9FB0C3;">Run the setup SQL to enable</td>`;

let reportsFilterNNL = { year:new Date().getFullYear(), view:'quarterly' };
let reportChartInstances = {};

let truckReportFilter = {
  NNL: { truck:'', start:'', end:'' }
};
function distinctTrucks(company){
  const s = new Set();
  loadsFor(company).forEach(l=>{ if(l.truck) s.add(l.truck.trim()); });
  state.expenses.filter(e=>e.company===company).forEach(e=>{ if(e.truck) s.add(e.truck.trim()); });
  return [...s].sort((a,b)=>a.localeCompare(b));
}
function computeTruckReport(company, truck, start, end){
  const inRange = d => !!d && (!start || d>=start) && (!end || d<=end);
  const loads = loadsFor(company).filter(l=>l.truck===truck && inRange(l.date));
  const expenses = state.expenses.filter(e=>e.company===company && e.truck===truck && inRange(e.date));
  const income = sum(loads,'revenue');
  const driverPay = sum(loads,'driverPay');
  const gas = sum(expenses.filter(e=>e.category==='Diesel'),'amount');
  const additional = sum(expenses.filter(e=>e.category!=='Diesel'),'amount');
  const net = income - driverPay - gas - additional;
  return { loadCount:loads.length, income, driverPay, gas, additional, net };
}
function renderTruckReportCard(company){
  const f = truckReportFilter[company];
  const trucks = distinctTrucks(company);
  const hasSelection = f.truck && f.start && f.end;
  const r = hasSelection ? computeTruckReport(company, f.truck, f.start, f.end) : null;
  return `
  <div class="card">
    <h2>Per-Truck Report <span class="tag">Pick a truck and a date range</span></h2>
    <div class="formgrid" style="grid-template-columns:repeat(3,minmax(140px,1fr));">
      <div class="field"><label>Truck #</label><select id="tr-truck-${company}">
        <option value="">Choose a truck…</option>
        ${trucks.map(t=>`<option value="${t}" ${f.truck===t?'selected':''}>${t}</option>`).join('')}
      </select></div>
      <div class="field"><label>From</label><input type="date" id="tr-start-${company}" value="${f.start}"></div>
      <div class="field"><label>To</label><input type="date" id="tr-end-${company}" value="${f.end}"></div>
    </div>
    ${!trucks.length ? `<div class="empty">No trucks found yet — Truck # is logged on Loads and Expenses.</div>` :
      !hasSelection ? `<div class="empty">Pick a truck and both dates to see its numbers for that range.</div>` : `
    <div class="statgrid">
      <div class="stat"><div class="label">Income (${r.loadCount} load${r.loadCount===1?'':'s'})</div><div class="value">${fmtMoney(r.income)}</div></div>
      <div class="stat"><div class="label">Gas Expenses</div><div class="value">${fmtMoney(r.gas)}</div></div>
      <div class="stat"><div class="label">Driver Pay</div><div class="value">${fmtMoney(r.driverPay)}</div></div>
      <div class="stat"><div class="label">Additional Expenses</div><div class="value">${fmtMoney(r.additional)}</div></div>
      <div class="stat amber"><div class="label">Net for Truck ${f.truck}</div><div class="value">${fmtMoney(r.net)}</div></div>
    </div>
    `}
  </div>`;
}

const EXPENSE_TAX_CATEGORY = {
  'Diesel':'Car & Truck Expenses (Sch. C Line 9)',
  'Tolls':'Car & Truck Expenses (Sch. C Line 9)',
  'Insurance':'Insurance, Other Than Health (Line 15)',
  'Truck Loan':'Interest Expense* (Line 16)',
  'Tires':'Repairs & Maintenance (Line 21)',
  'Oil Change':'Repairs & Maintenance (Line 21)',
  'Brakes':'Repairs & Maintenance (Line 21)',
  'Transmission':'Repairs & Maintenance (Line 21)',
  'Truck Repair (Other)':'Repairs & Maintenance (Line 21)',
  'Truck Repair':'Repairs & Maintenance (Line 21)',
  'Other':'Other Expenses (Line 27)',
};
const ANNUAL_TAX_CATEGORY = {
  '2290 Heavy Vehicle Use Tax':'Taxes & Licenses (Line 23)',
  'License Plates Renewal':'Taxes & Licenses (Line 23)',
};
function taxCategoryFor(name){ return EXPENSE_TAX_CATEGORY[name] || ANNUAL_TAX_CATEGORY[name] || 'Other Expenses (Line 27)'; }

function quarterOf(dateStr){ return Math.ceil(Number(dateStr.slice(5,7))/3); }
function getReportLoads(company){ return state.loads.filter(l=>l.company===company); }
function getReportExpenses(company){ return state.expenses.filter(e=>e.company===company); }

function getAvailableYears(){
  const years = new Set([String(reportsFilterNNL.year)]);
  state.loads.forEach(l=>{ if(l.date) years.add(l.date.slice(0,4)); });
  state.expenses.forEach(e=>{ if(e.date) years.add(e.date.slice(0,4)); });
  return [...years].sort();
}

function computeQuarterly(company, year){
  const loads = getReportLoads(company).filter(l=>l.date && l.date.slice(0,4)===String(year));
  const expenses = getReportExpenses(company).filter(e=>e.date && e.date.slice(0,4)===String(year));
  return [1,2,3,4].map(q=>{
    const qLoads = loads.filter(l=>quarterOf(l.date)===q);
    const qExp = expenses.filter(e=>quarterOf(e.date)===q);
    const revenue = sum(qLoads,'revenue'), driverPay = sum(qLoads,'driverPay'), opex = sum(qExp,'amount');
    return { q, revenue, driverPay, opex, net: revenue-driverPay-opex, loadCount:qLoads.length };
  });
}

function computeCategoryBreakdown(company, year){
  const map = {};
  getReportExpenses(company).filter(e=>e.date && e.date.slice(0,4)===String(year)).forEach(e=>{
    const cat = e.category||'Other';
    map[cat] = (map[cat]||0) + (Number(e.amount)||0);
  });
  const undated = [];
  state.annual.forEach(a=>{
    const amt = Number(a.amount)||0;
    if(!amt) return;
    if(a.due && a.due.slice(0,4)===String(year)) map[a.item] = (map[a.item]||0) + amt;
    else if(!a.due) undated.push(a);
  });
  return { map, undated };
}

function drawChart(canvasId, config){
  const canvas = document.getElementById(canvasId);
  if(!canvas || typeof Chart==='undefined') return;
  if(reportChartInstances[canvasId]){ reportChartInstances[canvasId].destroy(); }
  reportChartInstances[canvasId] = new Chart(canvas.getContext('2d'), config);
}

function drawReportsCharts(company){
  const filterState = reportsFilterNNL;

  Chart.defaults.font = CHART_FONT;
  Chart.defaults.color = '#5C7085';

  if(view==='quarterly'){
    const quarters = computeQuarterly(company, year);
    drawChart('chart-quarterly-'+company, {
      type:'bar',
      data:{
        labels: quarters.map(q=>'Q'+q.q),
        datasets:[
          { label:'Revenue', data:quarters.map(q=>q.revenue), backgroundColor:'#1F3A5F' },
          { label:'Driver Pay', data:quarters.map(q=>q.driverPay), backgroundColor:'#9FB0C3' },
          { label:'Operating Exp.', data:quarters.map(q=>q.opex), backgroundColor:'#D8483D' },
          { label:'Net', data:quarters.map(q=>q.net), backgroundColor:'#E8871E' },
        ]
      },
      options:{ responsive:true, maintainAspectRatio:false, scales:{ y:{ ticks:{ callback:v=>'$'+v.toLocaleString() } } }, plugins:{ legend:{ position:'bottom' } } }
    });
  } else {
    const years = getAvailableYears();
    const annualByYear = years.map(y=>{
      const qs = computeQuarterly(company, y);
      return { year:y, revenue:sum(qs,'revenue'), driverPay:sum(qs,'driverPay'), opex:sum(qs,'opex'), net:sum(qs,'net') };
    });
    drawChart('chart-annual-'+company, {
      type:'bar',
      data:{
        labels: annualByYear.map(a=>a.year),
        datasets:[
          { label:'Revenue', data:annualByYear.map(a=>a.revenue), backgroundColor:'#1F3A5F' },
          { label:'Driver Pay', data:annualByYear.map(a=>a.driverPay), backgroundColor:'#9FB0C3' },
          { label:'Operating Exp.', data:annualByYear.map(a=>a.opex), backgroundColor:'#D8483D' },
          { label:'Net', data:annualByYear.map(a=>a.net), backgroundColor:'#E8871E' },
        ]
      },
      options:{ responsive:true, maintainAspectRatio:false, scales:{ y:{ ticks:{ callback:v=>'$'+v.toLocaleString() } } }, plugins:{ legend:{ position:'bottom' } } }
    });
  }

  const { map: catMap } = computeCategoryBreakdown(company, year);
  const catEntries = Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  if(catEntries.length){
    drawChart('chart-category-'+company, {
      type:'doughnut',
      data:{
        labels: catEntries.map(([c])=>c),
        datasets:[{ data: catEntries.map(([,v])=>v), backgroundColor:['#1F3A5F','#E8871E','#2E9E5B','#D8483D','#9FB0C3','#254566','#CC6E0C','#5C7085'] }]
      },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom', labels:{ boxWidth:12, font:{size:10.5} } } } }
    });
  }
}

function invoiceTextFor(company, party, opts){
  const items = invoiceItemsFor(company, party, opts).slice().sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  if(!items.length) return null;
  const biz = BUSINESS_INFO[company];
  const rangeStart = opts.startDate || items[0].date;
  const rangeEnd = opts.endDate || items[items.length-1].date;
  const dueDate = addDays(rangeEnd,7);
  const invNum = items[0].invoiceNum || '(not yet generated — click Print first)';
  const jobGroups = {};
  items.forEach(l=>{
    const jn = l.jobName || '—';
    (jobGroups[jn] = jobGroups[jn] || []).push(l);
  });
  const lines = Object.entries(jobGroups).flatMap(([jobName, group])=>{
    const ticketLines = group.map(l=>{
      const customer = (l.customer||'') || '—';
      return `${fmtDate(l.date)}  |  Ticket ${l.ticket||'—'}  |  ${customer} · ${jobName}  |  ${fmtQty(l.qty)} ${unitLabel(l.paymentType)} @ ${fmtMoney(l.rate)}  =  ${fmtMoney(l.revenue)}`;
    });
    const qty = sum(group,'qty');
    const revenue = sum(group,'revenue');
    const unit = unitLabel(group[0].paymentType);
    return [...ticketLines, `Total for ${jobName}: ${fmtQty(qty)} ${unit}  =  ${fmtMoney(revenue)}`, ''];
  });
  const total = sum(items,'revenue');
  return [
    `${biz.name}`, ...(biz.sub? [biz.sub] : []), `${biz.phone}`, '',
    `INVOICE #${invNum}`, `Date Issued: ${fmtDate(rangeEnd)}`, `Payment Due: ${fmtDate(dueDate)}`, '',
    `Bill To: ${party}`, `${fmtDate(rangeStart)} – ${fmtDate(rangeEnd)}`, '',
    ...lines,
    `TOTAL DUE: ${fmtMoney(total)}`
  ].join('\n');
}
function copyInvoiceText(company, party, opts){
  if(!opts) opts = weekRange(currentWeekEnding);
  else if(typeof opts === 'string') opts = weekRange(opts);
  const text = invoiceTextFor(company, party, opts);
  if(!text){ alert('No loads found for '+party+' in that range.'); return; }
  navigator.clipboard.writeText(text).then(()=>{
    alert('Invoice copied — paste it into your email.');
  }).catch(()=>{
    alert('Could not copy automatically. Here is the invoice text:\n\n'+text);
  });
}

function getAllInvoices(){
  const map = {};
  state.loads.forEach(l=>{
    if(!l.invoiceNum) return;
    if(!map[l.invoiceNum]) map[l.invoiceNum] = {invoiceNum:l.invoiceNum, company:l.company, party:l.party, items:[]};
    map[l.invoiceNum].items.push(l);
  });
  return Object.values(map).map(inv=>{
    const week = weekEndingFriday(inv.items[0].date);
    const statuses = inv.items.map(i=>i.status);
    const status = statuses.every(s=>s==='Paid') ? 'Paid' : statuses.some(s=>s==='Paid') ? 'Partially Paid' : 'Invoiced';
    return { ...inv, week, total: sum(inv.items,'revenue'), status };
  }).sort((a,b)=> b.week.localeCompare(a.week));
}

function filteredLoads(company){
  const filterText = (loadsFilterText||'').toLowerCase();
  const f = loadsFilters;
  let rows = loadsFor(company);
  if(filterText){
    rows = rows.filter(l => [l.party,l.driver,l.truck,l.notes,l.paymentType,l.status,l.invoiceNum,l.ticket,l.customer,l.jobName]
      .some(v => (v||'').toString().toLowerCase().includes(filterText)));
  }
  if(f.status!=='All') rows = rows.filter(l => (l.status||'')===f.status);
  if(f.driver!=='All') rows = rows.filter(l => (l.driver||'')===f.driver);
  if(f.truck!=='All') rows = rows.filter(l => (l.truck||'').toString()===f.truck);
  if(f.party!=='All') rows = rows.filter(l => (l.party||'')===f.party);
  if(f.jobName!=='All') rows = rows.filter(l => (l.jobName||'')===f.jobName);
  if(f.datePaid==='missing') rows = rows.filter(l => !l.datePaid);
  else if(f.datePaid==='has') rows = rows.filter(l => !!l.datePaid);
  if(f.dateFrom) rows = rows.filter(l => (l.date||'') >= f.dateFrom);
  if(f.dateTo) rows = rows.filter(l => (l.date||'') <= f.dateTo);
  return rows;
}
function anyLoadsFilterActive(company){
  const f = loadsFilters;
  return !!(loadsFilterText || f.dateFrom || f.dateTo ||
    ['status','driver','truck','party','jobName','datePaid'].some(k=>f[k]!=='All'));
}

}

/* ============================= EXCEL IMPORT ============================= */
function normHeader(h){ return String(h||'').toLowerCase().replace(/[^a-z0-9]/g,''); }
const IMPORT_ALIASES = {
  date:['date'], party:['broker','client','party'],
  ticket:['ticket','ticketnum','ticketno','ticket#'],
  pit:['pit'], customer:['customer'], jobName:['jobname','job'],
  broker:['broker'],
  truck:['truck','truckno','truckno'], driver:['driver','hauler'],
  paymentType:['paymenttype','type'], qty:['quantity','qty','tons','yards'],
  rate:['rate','price','priceperunit'], driverPay:['driverpay','chofer30','driverpay30'],
  status:['paymentstatus','status'], invoiceNum:['invoice','invoicenum','invoiceno'],
  datePaid:['datepaid'], notes:['notes'], jobSource:['jobsource','source'],
  referredBy:['referredby'], driverType:['drivertype']
};
function dateToISO(v){
  if(!v) return '';
  if(v instanceof Date) return v.toISOString().slice(0,10);
  const s = String(v).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m) return `${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
  return '';
}
function mapRowToLoad(row, company){
  const norm = {};
  Object.keys(row).forEach(k=>{ norm[normHeader(k)] = row[k]; });
  const pick = aliases => { for(const a of aliases){ if(norm[a]!==undefined && norm[a]!=='') return norm[a]; } return ''; };
  const paymentTypeRaw = String(pick(IMPORT_ALIASES.paymentType)).toLowerCase();
  let paymentType = 'Per Ton';
  if(paymentTypeRaw.includes('yard')) paymentType='Per Yard';
  else if(paymentTypeRaw.includes('load')) paymentType='Per Load';
  else if(paymentTypeRaw.includes('hour')) paymentType='Per Hour';
  else if(paymentTypeRaw.includes('ton')) paymentType='Per Ton';
  const statusRaw = String(pick(IMPORT_ALIASES.status));
  const status = ['Pending','Invoiced','Paid'].find(s=>s.toLowerCase()===statusRaw.toLowerCase()) || 'Pending';
  return {
    date: dateToISO(pick(IMPORT_ALIASES.date)),
    party: String(pick(IMPORT_ALIASES.party)).trim(),
    ticket: String(pick(IMPORT_ALIASES.ticket)).trim(),
    pit: String(pick(IMPORT_ALIASES.pit)).trim(),
    customer: String(pick(IMPORT_ALIASES.customer)).trim(),
    jobName: String(pick(IMPORT_ALIASES.jobName)).trim(),
    broker: String(pick(IMPORT_ALIASES.broker)).trim(),
    truck: String(pick(IMPORT_ALIASES.truck)).trim(),
    driver: String(pick(IMPORT_ALIASES.driver)).trim(),
    paymentType, qty: pick(IMPORT_ALIASES.qty), rate: pick(IMPORT_ALIASES.rate),
    driverPay: pick(IMPORT_ALIASES.driverPay),
    status, invoiceNum: String(pick(IMPORT_ALIASES.invoiceNum)).trim(),
    datePaid: dateToISO(pick(IMPORT_ALIASES.datePaid)),
    notes: String(pick(IMPORT_ALIASES.notes)).trim(),
    jobSource: String(pick(IMPORT_ALIASES.jobSource)).trim() || 'Direct',
    driverType: String(pick(IMPORT_ALIASES.driverType)).trim() || 'Company Driver',
  };
}
async function handleImportFile(company, file){
  if(!file) return;
  let json;
  try{
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, {type:'array', cellDates:true});
    const sheet = wb.Sheets[wb.SheetNames[0]];
    json = XLSX.utils.sheet_to_json(sheet, {defval:''});
  }catch(e){ alert('Could not read that file. Make sure it is a .xlsx file.'); return; }
  if(!json.length){ alert('No rows found in that file.'); return; }
  let imported=0, skipped=0;
  json.forEach(row=>{
    const l = mapRowToLoad(row, company);
    if(!l.date || !l.party){ skipped++; return; }
    l.id = uid(); l.company = company;
    // Spreadsheets may have a flat driver-pay column (old convention) — convert
    // to an equivalent per-unit driverRate so computeLoadFinancials doesn't zero it out.
    if(l.driverPay && Number(l.qty)>0 && !l.driverRate){
      l.driverRate = (Number(l.driverPay)/Number(l.qty)).toFixed(2);
    }
    computeLoadFinancials(l);
    state.loads.push(l);
    imported++;
  });
  persist(); render();
  alert(`Imported ${imported} load(s).${skipped? ' Skipped '+skipped+' row(s) missing a date or broker name.':''}`);
}

    render();
  };
  const dupPanel = document.getElementById('dup-ticket-panel-'+currentLoadCompany);
  if(dupPanel){
    dupPanel.querySelectorAll('[data-edit-load]').forEach(b=>b.onclick=()=>{ editingLoadId=b.dataset.editLoad; render(); window.scrollTo(0,0); });
  }

  // Expenses
  const esave = document.getElementById('ef-save');
  if(esave) esave.onclick = ()=>{
    const get = id => document.getElementById(id)?.value;
    let e = editingExpenseId ? state.expenses.find(x=>x.id===editingExpenseId) : {id:uid()};
    e.company='NNL'; e.date=get('ef-date'); e.category=get('ef-category'); e.truck=get('ef-truck');
    e.amount=get('ef-amount'); e.frequency=get('ef-frequency'); e.notes=get('ef-notes');
    if(!editingExpenseId) state.expenses.push(e);
    editingExpenseId=null; persist(); render();
  };
  const ecancel = document.getElementById('ef-cancel');
  if(ecancel) ecancel.onclick = ()=>{ editingExpenseId=null; render(); };
  document.querySelectorAll('[data-edit-exp]').forEach(b=>b.onclick=()=>{ editingExpenseId=b.dataset.editExp; render(); window.scrollTo(0,0); });
  document.querySelectorAll('[data-del-exp]').forEach(b=>b.onclick=()=>{
    showConfirm('Delete this expense?', ()=>{
      state.expenses = state.expenses.filter(e=>e.id!==b.dataset.delExp);
      persist(); render();
    });
  });
  const tmFilter = document.getElementById('tm-truck-filter');
  if(tmFilter) tmFilter.onchange = ()=>{ truckMaintenanceFilter = tmFilter.value; render(); };

  // Weekly nav
  const wkStart = document.getElementById('wk-start');
  if(wkStart) wkStart.onchange = ()=>{ weeklyRange.start = wkStart.value; render(); };
  const wkEnd = document.getElementById('wk-end');
  if(wkEnd) wkEnd.onchange = ()=>{ weeklyRange.end = wkEnd.value; render(); };
  const wkPrev = document.getElementById('wk-prev');
  if(wkPrev) wkPrev.onclick = ()=>{ weeklyRange.start = addDays(weeklyRange.start,-7); weeklyRange.end = addDays(weeklyRange.end,-7); render(); };
  const wkNext = document.getElementById('wk-next');
  if(wkNext) wkNext.onclick = ()=>{ weeklyRange.start = addDays(weeklyRange.start,7); weeklyRange.end = addDays(weeklyRange.end,7); render(); };
  document.querySelectorAll('[data-edit-mismatch]').forEach(b=>b.onclick=()=>{
    const [company, loadId] = b.dataset.editMismatch.split('|');
    currentLoadCompany = company;
    editingLoadId = loadId;
    activeTab = 'nnl';
    render();
    window.scrollTo(0,0);
  });
  const printPayrollBtn = document.getElementById('print-payroll-btn');
  if(printPayrollBtn) printPayrollBtn.onclick = printDriverPayroll;
  document.querySelectorAll('.deduction-input').forEach(inp=>{
    inp.onchange = ()=>{
      setDeduction(inp.dataset.company, inp.dataset.driver, weeklyRange.start, weeklyRange.end, inp.value);
      render();
    };
  });
  document.querySelectorAll('.payref-input').forEach(inp=>{
    inp.onchange = ()=>{
      setPayrollField(inp.dataset.company, inp.dataset.driver, weeklyRange.start, weeklyRange.end, 'payRef', inp.value.trim());
    };
  });
  document.querySelectorAll('.deposited-check').forEach(cb=>{
    cb.onchange = ()=>{
      setPayrollField(cb.dataset.company, cb.dataset.driver, weeklyRange.start, weeklyRange.end, 'deposited', cb.checked);
    };
  });

  // Annual
  document.querySelectorAll('.annual-item,.annual-amount,.annual-due,.annual-status').forEach(inp=>{
    inp.onchange = ()=>{
      const {id} = inp.dataset;
      const item = state.annual.find(x=>x.id===id);
      if(!item) return;
      if(inp.classList.contains('annual-item')) item.item = inp.value;
      if(inp.classList.contains('annual-amount')) item.amount = inp.value;
      if(inp.classList.contains('annual-due')) item.due = inp.value;
      if(inp.classList.contains('annual-status')) item.status = inp.value;
      persist();
      render();
    };
  });
  document.querySelectorAll('[data-add-annual]').forEach(b=>b.onclick=()=>{
    state.annual.push({id:uid(), item:'New Item', amount:0, due:'', status:'Unpaid'});
    persist(); render();
  });
  document.querySelectorAll('[data-del-annual]').forEach(b=>b.onclick=()=>{
    const id = b.dataset.delAnnual;
    state.annual = state.annual.filter(x=>x.id!==id);
    persist(); render();
  });
  const yearInp = document.getElementById('annual-year');
  if(yearInp) yearInp.onchange = ()=>{ window.__annualYear = Number(yearInp.value); render(); };
  const gotoReports = document.getElementById('goto-reports-btn');
  if(gotoReports) gotoReports.onclick = ()=>{ activeTab='reports-nnl'; render(); };

  // Financial Reports
  const rpYearNNL = document.getElementById('rp-year-NNL');
  if(rpYearNNL) rpYearNNL.onchange = ()=>{ reportsFilterNNL.year = Number(rpYearNNL.value); render(); };
  const rpViewQNNL = document.getElementById('rp-view-quarterly-NNL');
  if(rpViewQNNL) rpViewQNNL.onclick = ()=>{ reportsFilterNNL.view='quarterly'; render(); };
  const rpViewANNL = document.getElementById('rp-view-annual-NNL');
  if(rpViewANNL) rpViewANNL.onclick = ()=>{ reportsFilterNNL.view='annual'; render(); };

  // Per-Truck Report
  const truckSel = document.getElementById('tr-truck-NNL');
  if(truckSel) truckSel.onchange = ()=>{ truckReportFilter.NNL.truck = truckSel.value; render(); };
  const startInp = document.getElementById('tr-start-NNL');
  if(startInp) startInp.onchange = ()=>{ truckReportFilter.NNL.start = startInp.value; render(); };
  const endInp = document.getElementById('tr-end-NNL');
  if(endInp) endInp.onchange = ()=>{ truckReportFilter.NNL.end = endInp.value; render(); };

  if(activeTab==='reports-nnl') drawReportsCharts('NNL');

  // Invoice buttons
  document.querySelectorAll('[data-invoice]').forEach(b=>b.onclick=()=>{
    const [company, partyEnc, startDate, endDate] = b.dataset.invoice.split('|');
    openInvoice(company, decodeURIComponent(partyEnc), {startDate, endDate});
  });

  // Broker payments — each check is its own log entry (date, amount, optional
  // check #); corrections are made by removing an entry, not overtyping.
  document.querySelectorAll('[data-add-broker-payment]').forEach(b=>b.onclick=()=>{
    const broker = decodeURIComponent(b.dataset.addBrokerPayment);
    const enc = b.dataset.addBrokerPayment;
    const input = document.querySelector(`[data-broker-payment-input="${enc}"]`);
    const noteInput = document.querySelector(`[data-broker-payment-note="${enc}"]`);
    const amount = Number(input && input.value)||0;
    if(amount<=0){ alert('Enter a payment amount first.'); return; }
    state.brokerPayments.push({ id:uid(), broker, date:new Date().toISOString().slice(0,10), amount:+amount.toFixed(2), note:(noteInput&&noteInput.value.trim())||'' });
    persist(); render();
  });
  document.querySelectorAll('[data-del-broker-payment]').forEach(b=>b.onclick=()=>{
    const p = state.brokerPayments.find(x=>x.id===b.dataset.delBrokerPayment);
    if(!p) return;
    showConfirm(`Remove the ${fmtMoney(p.amount)} payment from ${p.broker} recorded on ${fmtDate(p.date)}?`, ()=>{
      state.brokerPayments = state.brokerPayments.filter(x=>x.id!==p.id);
      persist(); render();
    });
  });
  document.querySelectorAll('[data-settle-broker]').forEach(b=>b.onclick=()=>{
    const broker = decodeURIComponent(b.dataset.settleBroker);
    const key = broker.trim().toLowerCase();
    const openLoads = state.loads.filter(l=>l.status!=='Paid' && (l.party||'').trim().toLowerCase()===key);
    const checks = paymentsForBroker(broker);
    showConfirm(`Settle ${broker}? This marks ${openLoads.length} load(s) as Paid and clears ${checks.length} recorded check(s) so the next billing cycle starts clean.`, ()=>{
      const today = new Date().toISOString().slice(0,10);
      openLoads.forEach(l=>{ l.status='Paid'; if(!l.datePaid) l.datePaid = today; });
      state.brokerPayments = state.brokerPayments.filter(p=>(p.broker||'').trim().toLowerCase()!==key);
      persist(); render();
    });
  });

  // Excel export
  document.querySelectorAll('[id^="export-loads-"]').forEach(b=>b.onclick=()=>{
    exportLoadsExcel(b.id.replace('export-loads-',''));
  });
  const exportAllBtn = document.getElementById('export-all-btn');
  if(exportAllBtn) exportAllBtn.onclick = ()=>exportAllExcel(COMPANY);

  // JSON backup / restore
  const backupBtn = document.getElementById('backup-json-btn');
  if(backupBtn) backupBtn.onclick = async ()=>{
    const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
    const filename = `Nalu_Nui_Logistics_Backup_${new Date().toISOString().slice(0,10)}.json`;
    await writeBlobToFolderOrDownload(blob, filename);
    localStorage.setItem(BACKUP_REMINDER_KEY, new Date().toISOString());
    if(activeTab==='dashboard') render();
  };
  const restoreBtn = document.getElementById('restore-json-btn');
  if(restoreBtn) restoreBtn.onclick = ()=>{
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.json,application/json';
    input.onchange = ()=>{
      const file = input.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ()=>{
        try{
          const parsed = JSON.parse(reader.result);
          if(!parsed || !Array.isArray(parsed.loads)) throw new Error('Not a valid backup file');
          const cur = state.loads.length + state.expenses.length;
          const doRestore = ()=>{
            state = Object.assign(state, parsed);
            state.loads.forEach(computeLoadFinancials);
            persist(); render();
            alert('Backup restored ✓');
          };
          if(cur>0){
            showConfirm(`Restore backup? This will REPLACE your current data (${state.loads.length} loads, ${state.expenses.length} expenses) with the backup (${parsed.loads.length} loads, ${(parsed.expenses||[]).length} expenses).`, doRestore);
          } else {
            doRestore();
          }
        }catch(e){ alert('Could not read that file — make sure it\'s a backup downloaded from the "Backup Data" button. ('+e.message+')'); }
      };
      reader.readAsText(file);
    };
    input.click();
  };
  const connectFolderBtn = document.getElementById('connect-folder-btn');
  if(connectFolderBtn) connectFolderBtn.onclick = connectExportFolder;

  // Invoices tab
  const ivGenerate = document.getElementById('iv-generate');
  if(ivGenerate) ivGenerate.onclick = ()=>{
    const party = document.getElementById('iv-party').value.trim();
    const startDate = document.getElementById('iv-start').value;
    const endDate = document.getElementById('iv-end').value;
    if(!party){ alert('Type a broker name first.'); return; }
    if(!startDate || !endDate){ alert('Pick a From and To date first.'); return; }
    if(startDate > endDate){ alert('The From date must be on or before the To date.'); return; }
    openInvoice('NNL', party, {startDate, endDate});
  };
  const ivPrintAll = document.getElementById('iv-printall');
  if(ivPrintAll) ivPrintAll.onclick = ()=> printAllForWeek(currentWeekEnding);
  document.querySelectorAll('[data-view-inv]').forEach(b=>b.onclick=()=>{
    const invoiceNum = b.dataset.viewInv;
    const inv = getAllInvoices().find(i=>i.invoiceNum===invoiceNum);
    if(inv) openInvoice(inv.company, inv.party, {invoiceNum});
  });
  document.querySelectorAll('[data-copy-inv]').forEach(b=>b.onclick=()=>{
    const invoiceNum = b.dataset.copyInv;
    const inv = getAllInvoices().find(i=>i.invoiceNum===invoiceNum);
    if(inv) copyInvoiceText(inv.company, inv.party, {invoiceNum});
  });
}
</script>
<script src="/shared/auth.js"></script>
</body>
</html>
